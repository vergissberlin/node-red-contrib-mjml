<script type="text/javascript">
    RED.nodes.registerType('mjml-parse', {
        category: 'parser',
        color: '#f46d4c',
        defaults: {
            name: {value: ""},
            template: {value: ""}
        },
        inputs: 1,
        outputs: 1,
        icon: "mjml.svg",
        label: function () {
            return this.name || "mjml-parse";
        },
        oneditprepare: function () {
            var node = this;
            var stateId = RED.editor.generateViewStateId("node", this, "template");
            var tagsEndpoint = "resources/@vergissberlin/node-red-contrib-mjml/mjml-parse/resources/mjml-tags.json";
            var templatesEndpoint = "resources/@vergissberlin/node-red-contrib-mjml/mjml-parse/resources/mjml-templates.json";
            var adminRoot = (RED.settings.httpAdminRoot || "/").replace(/\/?$/, "/");
            var previewEndpoint = adminRoot + "mjml-parse/preview";
            var fallbackTags = ["mjml", "mj-head", "mj-body", "mj-section", "mj-column", "mj-text", "mj-image", "mj-button"];
            var fallbackAttributes = ["id", "css-class", "background-color", "color", "font-family", "font-size", "align", "padding", "href", "src"];
            var fallbackTemplates = [
                {
                    id: "simple-email",
                    labelKey: "mjmlParse.templates.simpleEmail",
                    mjml: "<mjml><mj-head><mj-title>{{subject}}</mj-title><mj-preview>{{previewText}}</mj-preview><mj-attributes><mj-all font-family=\"Arial, sans-serif\" /><mj-text color=\"#1f2937\" font-size=\"16px\" line-height=\"24px\" /><mj-button background-color=\"#f46d4c\" color=\"#ffffff\" border-radius=\"6px\" /></mj-attributes></mj-head><mj-body background-color=\"#f5f7fb\"><mj-section padding=\"24px 0\"><mj-column><mj-text align=\"center\" font-size=\"24px\" font-weight=\"700\" color=\"#111827\">{{headline}}</mj-text><mj-text align=\"center\" color=\"#4b5563\">{{message}}</mj-text></mj-column></mj-section><mj-section background-color=\"#ffffff\" border-radius=\"8px\" padding=\"24px\"><mj-column><mj-text font-size=\"18px\" font-weight=\"600\" color=\"#111827\">What happens next</mj-text><mj-text color=\"#4b5563\">Use this quick update to guide people through the next step in your flow.</mj-text><mj-button href=\"https://example.com\">Open details</mj-button></mj-column></mj-section><mj-section padding=\"16px 0 0 0\"><mj-column><mj-text align=\"center\" font-size=\"12px\" color=\"#9ca3af\">You receive this email because you are part of this workflow.</mj-text></mj-column></mj-section></mj-body></mjml>"
                },
                {
                    id: "nodered-style",
                    labelKey: "mjmlParse.templates.nodeRedStyle",
                    mjml: "<mjml><mj-head><mj-title>{{subject}}</mj-title><mj-preview>{{previewText}}</mj-preview><mj-attributes><mj-all font-family=\"Arial, sans-serif\" /><mj-text color=\"#e5e7eb\" font-size=\"15px\" line-height=\"22px\" /><mj-button background-color=\"#f46d4c\" color=\"#ffffff\" border-radius=\"4px\" /></mj-attributes></mj-head><mj-body background-color=\"#111827\"><mj-section background-color=\"#C02020\" padding=\"18px 24px\"><mj-column><mj-text color=\"#ffffff\" font-size=\"20px\" font-weight=\"700\">Node-RED Update</mj-text><mj-text color=\"#fee2e2\" font-size=\"13px\">Flow {{flowName}} changed at {{updatedAt}}</mj-text></mj-column></mj-section><mj-section background-color=\"#1f2937\" padding=\"24px\"><mj-column><mj-text color=\"#ffffff\" font-size=\"22px\" font-weight=\"700\">{{headline}}</mj-text><mj-text>{{message}}</mj-text><mj-text color=\"#9ca3af\" font-size=\"13px\">Node: {{nodeName}}<br/>Status: {{status}}</mj-text><mj-button href=\"https://nodered.org\">Open Node-RED</mj-button></mj-column></mj-section><mj-section padding=\"14px 24px\"><mj-column><mj-text align=\"center\" font-size=\"12px\" color=\"#6b7280\">Generated by your Node-RED automation flow.</mj-text></mj-column></mj-section></mj-body></mjml>"
                }
            ];
            var validationTimer = null;
            var previewTimer = null;
            var previewRequestId = 0;
            var previewAbortController = null;
            var sidebarPreviewTabId = "mjml-parse-preview";
            var sidebarPreviewContentId = "mjml-parse-sidebar-preview-content";
            var popupPreviewWindow = null;
            var supportsSidebarPreview = false;
            node._mjmlPreviewAbortController = null;
            node._mjmlPreviewTimer = null;

            node.editor = RED.editor.createEditor({
                id: 'node-input-template-editor',
                mode: 'ace/mode/xml',
                stateId: stateId,
                value: $("#node-input-template").val()
            });

            if (!node.editor || typeof node.editor.getValue !== "function") {
                $("#node-mjml-preview-status").text("Editor initialization failed.").css("color", "#c62828");
                return;
            }

            if (typeof node.editor.setOptions === "function") {
                node.editor.setOptions({
                    enableBasicAutocompletion: true,
                    enableLiveAutocompletion: true
                });
            } else if (typeof node.editor.setOption === "function") {
                node.editor.setOption("enableBasicAutocompletion", true);
                node.editor.setOption("enableLiveAutocompletion", true);
            }

            // Prevent password manager extensions from attaching to editor controls.
            $("#node-input-name, #node-input-template-picker, #node-input-template")
                .attr("autocomplete", "off")
                .attr("data-lpignore", "true")
                .attr("data-1p-ignore", "true")
                .attr("data-bwignore", "true")
                .attr("data-keeper-ignore", "true");
            $("#node-input-template-editor").find("textarea")
                .attr("autocomplete", "off")
                .attr("data-lpignore", "true")
                .attr("data-1p-ignore", "true")
                .attr("data-bwignore", "true")
                .attr("data-keeper-ignore", "true");

            function parseLineColumn(message) {
                var match = /line\s+(\d+).*column\s+(\d+)/i.exec(message);
                if (!match) {
                    return null;
                }
                return {
                    row: Math.max(0, parseInt(match[1], 10) - 1),
                    column: Math.max(0, parseInt(match[2], 10) - 1)
                };
            }

            function validateXml() {
                var editorValue = node.editor.getValue() || "";
                var xmlForValidation = editorValue.replace(/\{\{\{?[\s\S]*?\}?\}\}/g, "mjml_placeholder");
                var parser = new DOMParser();
                var doc = parser.parseFromString(xmlForValidation, "application/xml");
                var parserError = doc.querySelector("parsererror");
                var session = node.editor.getSession();
                var indicator = $("#node-mjml-xml-validation");

                session.clearAnnotations();

                if (!editorValue.trim()) {
                    indicator.text(RED._("mjmlParse.template.validation.empty")).css("color", "");
                    return;
                }

                if (!parserError) {
                    indicator.text(RED._("mjmlParse.template.validation.valid")).css("color", "#2e7d32");
                    return;
                }

                var message = parserError.textContent.replace(/\s+/g, " ").trim();
                var location = parseLineColumn(message);
                if (location) {
                    session.setAnnotations([{
                        row: location.row,
                        column: location.column,
                        text: RED._("mjmlParse.template.validation.invalid"),
                        type: "error"
                    }]);
                }

                indicator.text(RED._("mjmlParse.template.validation.invalid") + " " + message).css("color", "#c62828");
            }

            function scheduleValidation() {
                if (validationTimer) {
                    clearTimeout(validationTimer);
                }
                validationTimer = setTimeout(validateXml, 300);
            }

            function resolveI18n(key, fallback) {
                var translated = null;
                if (node && typeof node._ === "function") {
                    translated = node._(key);
                }
                if (!translated || translated === key) {
                    translated = RED._(key);
                }
                if (!translated || translated === key) {
                    return fallback;
                }
                return translated;
            }

            function setupTemplatePicker() {
                var $templatePicker = $("#node-input-template-picker");
                if (!$templatePicker.length) {
                    return;
                }

                function resetPicker() {
                    $templatePicker.val("");
                }

                function renderOptions(templates) {
                    $templatePicker.empty();
                    $templatePicker.append(
                        $("<option>", {
                            value: "",
                            text: resolveI18n("mjmlParse.templates.none", "No starter template")
                        })
                    );

                    templates.forEach(function (template) {
                        if (!template || typeof template.id !== "string" || typeof template.mjml !== "string") {
                            return;
                        }
                        $templatePicker.append(
                            $("<option>", {
                                value: template.id,
                                text: resolveI18n(template.labelKey, template.id)
                            }).data("mjml", template.mjml)
                        );
                    });
                    resetPicker();
                }

                fetch(templatesEndpoint)
                    .then(function (response) {
                        if (!response.ok) {
                            throw new Error("Template list could not be loaded.");
                        }
                        return response.json();
                    })
                    .then(function (payload) {
                        var templates = payload && Array.isArray(payload.templates) ? payload.templates : [];
                        renderOptions(templates.length ? templates : fallbackTemplates);
                    })
                    .catch(function () {
                        renderOptions(fallbackTemplates);
                    });

                function applyTemplate(mjmlTemplate) {
                    var formattedTemplate = beautifyXml(mjmlTemplate) || mjmlTemplate;
                    node.editor.setValue(formattedTemplate, -1);
                    scheduleValidation();
                    schedulePreview();
                    resetPicker();
                }

                function confirmReplaceDialog(message, onDecision) {
                    var confirmTitle = resolveI18n("mjmlParse.templates.confirmTitle", "Replace template");
                    var cancelText = resolveI18n("mjmlParse.templates.confirmCancel", "Cancel");
                    var replaceText = resolveI18n("mjmlParse.templates.confirmAction", "Replace");

                    $("<div></div>")
                        .text(message)
                        .dialog({
                            title: confirmTitle,
                            modal: true,
                            resizable: false,
                            width: 420,
                            close: function () {
                                $(this).dialog("destroy").remove();
                            },
                            buttons: [
                                {
                                    text: cancelText,
                                    click: function () {
                                        $(this).dialog("close");
                                        onDecision(false);
                                    }
                                },
                                {
                                    text: replaceText,
                                    class: "primary",
                                    click: function () {
                                        $(this).dialog("close");
                                        onDecision(true);
                                    }
                                }
                            ]
                        });
                }

                $templatePicker.off("change").on("change", function () {
                    var selectedId = $templatePicker.val();
                    if (!selectedId) {
                        return;
                    }

                    var selectedOption = $templatePicker.find("option:selected");
                    var mjmlTemplate = selectedOption.data("mjml");
                    if (typeof mjmlTemplate !== "string" || !mjmlTemplate.trim()) {
                        resetPicker();
                        return;
                    }

                    var existingValue = (node.editor.getValue() || "").trim();
                    if (existingValue) {
                        var confirmMessage = resolveI18n(
                            "mjmlParse.templates.confirmReplace",
                            "Replace the current editor content with the selected starter template?"
                        );
                        confirmReplaceDialog(confirmMessage, function (shouldReplace) {
                            if (!shouldReplace) {
                                resetPicker();
                                return;
                            }
                            applyTemplate(mjmlTemplate);
                        });
                        return;
                    }
                    applyTemplate(mjmlTemplate);
                });
            }

            function beautifyXml(xmlSource) {
                var placeholders = [];
                var sanitized = (xmlSource || "").replace(/\{\{\{?[\s\S]*?\}?\}\}/g, function (match) {
                    var token = "__MJML_PLACEHOLDER_" + placeholders.length + "__";
                    placeholders.push({ token: token, value: match });
                    return token;
                });

                var parser = new DOMParser();
                var doc = parser.parseFromString(sanitized, "application/xml");
                if (doc.querySelector("parsererror")) {
                    return null;
                }

                function escapeText(text) {
                    return String(text)
                        .replace(/&/g, "&amp;")
                        .replace(/</g, "&lt;")
                        .replace(/>/g, "&gt;");
                }

                function escapeAttribute(text) {
                    return escapeText(text).replace(/"/g, "&quot;");
                }

                function restorePlaceholders(text) {
                    return placeholders.reduce(function (accumulator, item) {
                        return accumulator.split(item.token).join(item.value);
                    }, text);
                }

                function serializeNode(node, level) {
                    var indent = "  ".repeat(level);
                    var nextIndent = "  ".repeat(level + 1);

                    if (node.nodeType === Node.TEXT_NODE) {
                        var text = node.nodeValue || "";
                        if (!text.trim()) {
                            return "";
                        }
                        return indent + escapeText(text.trim()) + "\n";
                    }

                    if (node.nodeType !== Node.ELEMENT_NODE) {
                        return "";
                    }

                    var attributes = Array.prototype.map.call(node.attributes || [], function (attr) {
                        return " " + attr.name + "=\"" + escapeAttribute(attr.value) + "\"";
                    }).join("");

                    var childNodes = Array.prototype.filter.call(node.childNodes || [], function (child) {
                        if (child.nodeType === Node.TEXT_NODE) {
                            return (child.nodeValue || "").trim().length > 0;
                        }
                        return child.nodeType === Node.ELEMENT_NODE;
                    });

                    if (!childNodes.length) {
                        return indent + "<" + node.nodeName + attributes + " />\n";
                    }

                    if (childNodes.length === 1 && childNodes[0].nodeType === Node.TEXT_NODE) {
                        return (
                            indent +
                            "<" + node.nodeName + attributes + ">" +
                            escapeText((childNodes[0].nodeValue || "").trim()) +
                            "</" + node.nodeName + ">\n"
                        );
                    }

                    var content = indent + "<" + node.nodeName + attributes + ">\n";
                    childNodes.forEach(function (child) {
                        if (child.nodeType === Node.TEXT_NODE) {
                            content += nextIndent + escapeText((child.nodeValue || "").trim()) + "\n";
                            return;
                        }
                        content += serializeNode(child, level + 1);
                    });
                    content += indent + "</" + node.nodeName + ">\n";
                    return content;
                }

                var root = doc.documentElement;
                if (!root) {
                    return null;
                }
                var formatted = serializeNode(root, 0);
                return restorePlaceholders(formatted.trim());
            }

            function runBeautify(editorInstance) {
                if (!editorInstance || typeof editorInstance.getValue !== "function") {
                    return;
                }
                var currentValue = editorInstance.getValue();
                if (!currentValue || !currentValue.trim()) {
                    return;
                }
                var formatted = beautifyXml(currentValue);
                if (!formatted) {
                    RED.notify("Unable to beautify: XML is not well-formed.", "warning");
                    return;
                }
                if (typeof editorInstance.setValue === "function") {
                    editorInstance.setValue(formatted, -1);
                }
                scheduleValidation();
                schedulePreview();
            }


            function setPreviewStatus(key, color, details) {
                var fallbackTexts = {
                    "mjmlParse.preview.label": "MJML preview",
                    "mjmlParse.preview.empty": "Preview is empty. Start typing MJML to render HTML.",
                    "mjmlParse.preview.loading": "Rendering preview...",
                    "mjmlParse.preview.ready": "Preview updated.",
                    "mjmlParse.preview.error": "Preview rendering failed:"
                };
                var statusText = RED._(key);
                if (!statusText || statusText === key) {
                    statusText = fallbackTexts[key] || key;
                }
                if (details) {
                    statusText += " " + details;
                }
                $("#node-mjml-preview-status").text(statusText).css("color", color || "");
            }

            function ensureSidebarPreviewTab() {
                if (!RED.sidebar || typeof RED.sidebar.addTab !== "function") {
                    return false;
                }
                if ($("#" + sidebarPreviewContentId).length) {
                    return true;
                }
                try {
                    var previewTabLabel = resolveI18n("mjmlParse.preview.label", "MJML preview");
                    RED.sidebar.addTab({
                        id: sidebarPreviewTabId,
                        label: previewTabLabel,
                        name: previewTabLabel,
                        iconClass: "fa fa-eye",
                        content: $("<div>", {
                            id: sidebarPreviewContentId,
                            style: "padding:8px; height:100%; overflow:auto; background:#fff;"
                        })
                    });
                    return true;
                } catch (error) {
                    return $("#" + sidebarPreviewContentId).length > 0;
                }
            }

            function ensurePopupPreviewWindow() {
                if (popupPreviewWindow && !popupPreviewWindow.closed) {
                    return popupPreviewWindow;
                }
                popupPreviewWindow = window.open("", "mjml-parse-preview-window");
                if (!popupPreviewWindow) {
                    return null;
                }
                popupPreviewWindow.document.title = resolveI18n("mjmlParse.preview.label", "MJML preview");
                return popupPreviewWindow;
            }

            function setPopupPreviewHtml(html) {
                var popup = ensurePopupPreviewWindow();
                if (!popup) {
                    return false;
                }
                var safeHtml = html || "";
                popup.document.open();
                popup.document.write(safeHtml);
                popup.document.close();
                popup.focus();
                return true;
            }

            function setSidebarPreviewHtml(html) {
                if (supportsSidebarPreview) {
                    var previewElement = $("#" + sidebarPreviewContentId);
                    if (previewElement.length) {
                        previewElement.html(html || "");
                        if (RED.sidebar && typeof RED.sidebar.show === "function") {
                            RED.sidebar.show(sidebarPreviewTabId);
                        }
                        return;
                    }
                }
                setPopupPreviewHtml(html || "");
            }

            function renderPreview() {
                var editorValue = node.editor.getValue() || "";

                if (!editorValue.trim()) {
                    setSidebarPreviewHtml("");
                    setPreviewStatus("mjmlParse.preview.empty", "");
                    return;
                }

                if (previewAbortController) {
                    previewAbortController.abort();
                }

                previewAbortController = new AbortController();
                node._mjmlPreviewAbortController = previewAbortController;
                previewRequestId += 1;
                var requestId = previewRequestId;

                setPreviewStatus("mjmlParse.preview.loading", "#666");

                fetch(previewEndpoint, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ template: editorValue }),
                    signal: previewAbortController.signal
                })
                    .then(function (response) {
                        return response.json().then(function (payload) {
                            return { response: response, payload: payload };
                        });
                    })
                    .then(function (result) {
                        if (requestId !== previewRequestId) {
                            return;
                        }

                        var payload = result.payload || {};
                        var errors = Array.isArray(payload.errors) ? payload.errors : [];
                        if (payload.ok) {
                            setSidebarPreviewHtml(payload.html || "");
                            setPreviewStatus("mjmlParse.preview.ready", "#2e7d32");
                            return;
                        }

                        setSidebarPreviewHtml("");
                        setPreviewStatus("mjmlParse.preview.error", "#c62828", errors[0] || "");
                    })
                    .catch(function (error) {
                        if (error && error.name === "AbortError") {
                            return;
                        }
                        if (requestId !== previewRequestId) {
                            return;
                        }
                        setSidebarPreviewHtml("");
                        setPreviewStatus("mjmlParse.preview.error", "#c62828", (error && error.message) || "");
                    });
            }

            function schedulePreview() {
                if (previewTimer) {
                    clearTimeout(previewTimer);
                }
                previewTimer = setTimeout(renderPreview, 500);
                node._mjmlPreviewTimer = previewTimer;
            }

            function attachCompleter(tags, attributes) {
                var langTools = ace.require("ace/ext/language_tools");
                if (!langTools) {
                    return;
                }

                var completer = {
                    getCompletions: function (editor, session, pos, prefix, callback) {
                        var line = session.getLine(pos.row).slice(0, pos.column);
                        var suggestions = [];

                        if (/<\/?mj[-\w]*$/i.test(line)) {
                            suggestions = tags.map(function (tag) {
                                return {
                                    caption: "<" + tag + ">",
                                    value: tag,
                                    meta: "mjml-tag"
                                };
                            });
                        } else if (/<\w[\w-]*\s+[^>]*$/i.test(line) && !/=\s*["'][^"']*$/.test(line)) {
                            suggestions = attributes.map(function (attr) {
                                return {
                                    caption: attr + '=""',
                                    value: attr + '=""',
                                    meta: "mjml-attr"
                                };
                            });
                        }

                        if (!suggestions.length) {
                            callback(null, []);
                            return;
                        }

                        callback(null, suggestions);
                    }
                };

                langTools.addCompleter(completer);
            }

            fetch(tagsEndpoint)
                .then(function (response) { return response.ok ? response.json() : { tags: fallbackTags, attributes: fallbackAttributes }; })
                .then(function (data) {
                    attachCompleter(
                        (data && data.tags) || fallbackTags,
                        (data && data.attributes) || fallbackAttributes
                    );
                })
                .catch(function () { attachCompleter(fallbackTags, fallbackAttributes); });

            node.editor.getSession().on("change", function () {
                scheduleValidation();
                schedulePreview();
            });
            supportsSidebarPreview = ensureSidebarPreviewTab();
            $("#node-mjml-template-source-hint")
                .text(resolveI18n(
                    "mjmlParse.template.hintOverride",
                    "When this editor contains MJML, msg.payload.message is overwritten."
                ));
            setupTemplatePicker();
            scheduleValidation();
            schedulePreview();

            RED.popover.tooltip($("#node-template-expand-editor"), RED._("node-red:common.label.expand"));
            RED.popover.tooltip(
                $("#node-template-beautify-editor"),
                resolveI18n("mjmlParse.template.beautify", "Beautify XML")
            );
            $("#node-template-beautify-label")
                .text(resolveI18n("mjmlParse.template.beautify", "Beautify XML"));
            $("#node-template-expand-editor").on("click", function (e) {
                e.preventDefault();
                var value = node.editor.getValue();
                node.editor.saveView();
                RED.editor.editText({
                    mode: "xml",
                    value: value,
                    stateId: stateId,
                    width: "Infinity",
                    focus: true,
                    complete: function (v) {
                        node.editor.setValue(v, -1);
                        setTimeout(function () {
                            node.editor.restoreView();
                            node.editor.focus();
                        }, 250);
                    }
                });
            });
            $("#node-template-beautify-editor").on("click", function (e) {
                e.preventDefault();
                runBeautify(node.editor);
            });
        },
        oneditsave: function () {
            $("#node-input-template").val(this.editor.getValue());
            if (this._mjmlPreviewTimer) {
                clearTimeout(this._mjmlPreviewTimer);
                this._mjmlPreviewTimer = null;
            }
            if (this._mjmlPreviewAbortController) {
                this._mjmlPreviewAbortController.abort();
                this._mjmlPreviewAbortController = null;
            }
            if (popupPreviewWindow && !popupPreviewWindow.closed) {
                popupPreviewWindow.close();
                popupPreviewWindow = null;
            }
            this.editor.destroy();
            delete this.editor;
        },
        oneditcancel: function () {
            if (this._mjmlPreviewTimer) {
                clearTimeout(this._mjmlPreviewTimer);
                this._mjmlPreviewTimer = null;
            }
            if (this._mjmlPreviewAbortController) {
                this._mjmlPreviewAbortController.abort();
                this._mjmlPreviewAbortController = null;
            }
            if (popupPreviewWindow && !popupPreviewWindow.closed) {
                popupPreviewWindow.close();
                popupPreviewWindow = null;
            }
            this.editor.destroy();
            delete this.editor;
        },
        oneditresize: function (size) {
            var rows = $("#dialog-form>div:not(.node-text-editor-row)");
            var height = $("#dialog-form").height();
            for (var i = 0; i < rows.length; i++) {
                height -= $(rows[i]).outerHeight(true);
            }
            var editorRow = $("#dialog-form>div.node-text-editor-row");
            height -= (parseInt(editorRow.css("marginTop"), 10) + parseInt(editorRow.css("marginBottom"), 10));
            $("#node-mjml-editor-container").css("height", height + "px");
            $("#node-mjml-editor-pane").css("height", height + "px");
            $("#node-input-template-editor").css("height", height + "px");
            if (this.editor) {
                this.editor.resize();
            }
        }
    });
</script>

<script type="text/html" data-template-name="mjml-parse">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> <span data-i18n="mjmlParse.name.label"></span></label>
        <input type="text" id="node-input-name" data-i18n="[placeholder]mjmlParse.name.placeholder" autocomplete="off" data-lpignore="true" data-1p-ignore="true" data-bwignore="true" data-keeper-ignore="true">
    </div>
    <div class="form-row">
        <label for="node-input-template-picker"><i class="fa fa-copy"></i> <span data-i18n="mjmlParse.templates.label"></span></label>
        <select id="node-input-template-picker" autocomplete="off" data-lpignore="true" data-1p-ignore="true" data-bwignore="true" data-keeper-ignore="true"></select>
    </div>
    <div class="form-row node-text-editor-row">
        <label for="node-input-template"><i class="fa fa-code"></i> <span data-i18n="mjmlParse.template.label"></span></label>
        <input type="hidden" id="node-input-template" autocomplete="off" data-lpignore="true" data-1p-ignore="true" data-bwignore="true" data-keeper-ignore="true">
        <div id="node-mjml-editor-container" style="height:420px;">
