<script type="text/javascript">
    RED.nodes.registerType('mjml-parse', {
        category: 'parser',
        color: '#f46d4c',
        defaults: {
            name: {value: ""},
            template: {value: ""}
        },
        inputs: 1,
        outputs: 1,
        icon: "mjml.svg",
        label: function () {
            return this.name || "mjml-parse";
        },
        oneditprepare: function () {
            var node = this;
            var stateId = RED.editor.generateViewStateId("node", this, "template");
            var adminRoot = (RED.settings.httpAdminRoot || "/").replace(/\/?$/, "/");
            var previewEndpoint = adminRoot + "mjml-parse/preview";
            var fallbackTags = ["mjml", "mj-head", "mj-body", "mj-section", "mj-column", "mj-text", "mj-image", "mj-button"];
            var fallbackAttributes = ["id", "css-class", "background-color", "color", "font-family", "font-size", "align", "padding", "href", "src"];
            var fallbackTemplates = [
                {
                    id: "simple-email",
                    labelKey: "mjmlParse.templates.simpleEmail",
                    mjml: "<mjml><mj-head><mj-title>{{subject}}</mj-title><mj-preview>{{previewText}}</mj-preview><mj-attributes><mj-all font-family=\"Arial, sans-serif\" /><mj-text color=\"#1f2937\" font-size=\"16px\" line-height=\"24px\" /><mj-button background-color=\"#f46d4c\" color=\"#ffffff\" border-radius=\"6px\" /></mj-attributes></mj-head><mj-body background-color=\"#f5f7fb\"><mj-section padding=\"24px 0\"><mj-column><mj-text align=\"center\" font-size=\"24px\" font-weight=\"700\" color=\"#111827\">{{headline}}</mj-text><mj-text align=\"center\" color=\"#4b5563\">{{message}}</mj-text></mj-column></mj-section><mj-section background-color=\"#ffffff\" border-radius=\"8px\" padding=\"24px\"><mj-column><mj-text font-size=\"18px\" font-weight=\"600\" color=\"#111827\">What happens next</mj-text><mj-text color=\"#4b5563\">Use this quick update to guide people through the next step in your flow.</mj-text><mj-button href=\"https://example.com\">Open details</mj-button></mj-column></mj-section><mj-section padding=\"16px 0 0 0\"><mj-column><mj-text align=\"center\" font-size=\"12px\" color=\"#9ca3af\">You receive this email because you are part of this workflow.</mj-text></mj-column></mj-section></mj-body></mjml>"
                },
                {
                    id: "nodered-style",
                    labelKey: "mjmlParse.templates.nodeRedStyle",
                    mjml: "<mjml><mj-head><mj-title>{{subject}}</mj-title><mj-preview>{{previewText}}</mj-preview><mj-attributes><mj-all font-family=\"Arial, sans-serif\" /><mj-text color=\"#e5e7eb\" font-size=\"15px\" line-height=\"22px\" /><mj-button background-color=\"#f46d4c\" color=\"#ffffff\" border-radius=\"4px\" /></mj-attributes></mj-head><mj-body background-color=\"#111827\"><mj-section background-color=\"#C02020\" padding=\"18px 24px\"><mj-column><mj-text color=\"#ffffff\" font-size=\"20px\" font-weight=\"700\">Node-RED Update</mj-text><mj-text color=\"#fee2e2\" font-size=\"13px\">Flow {{flowName}} changed at {{updatedAt}}</mj-text></mj-column></mj-section><mj-section background-color=\"#1f2937\" padding=\"24px\"><mj-column><mj-text color=\"#ffffff\" font-size=\"22px\" font-weight=\"700\">{{headline}}</mj-text><mj-text>{{message}}</mj-text><mj-text color=\"#9ca3af\" font-size=\"13px\">Node: {{nodeName}}<br/>Status: {{status}}</mj-text><mj-button href=\"https://nodered.org\">Open Node-RED</mj-button></mj-column></mj-section><mj-section padding=\"14px 24px\"><mj-column><mj-text align=\"center\" font-size=\"12px\" color=\"#6b7280\">Generated by your Node-RED automation flow.</mj-text></mj-column></mj-section></mj-body></mjml>"
                },
                {
                    id: "charts-report",
                    labelKey: "mjmlParse.templates.chartsReport",
                    mjml: "<mjml><mj-head><mj-title>{{subject}}</mj-title><mj-preview>{{previewText}}</mj-preview></mj-head><mj-body background-color=\"#f8fafc\"><mj-section background-color=\"#ffffff\"><mj-column><mj-text font-size=\"24px\" font-weight=\"700\">Weekly KPI report</mj-text><mj-text>{{message}}</mj-text><mj-text font-size=\"12px\">Revenue progress</mj-text><mj-divider border-width=\"14px\" border-color=\"#22c55e\" width=\"84%\" align=\"left\" /><mj-text font-size=\"12px\">Retention rate</mj-text><mj-divider border-width=\"14px\" border-color=\"#3b82f6\" width=\"71%\" align=\"left\" /><mj-button background-color=\"#0f172a\" href=\"https://example.com\">Open full dashboard</mj-button></mj-column></mj-section></mj-body></mjml>"
                },
                {
                    id: "minimal-announcement",
                    labelKey: "mjmlParse.templates.minimalAnnouncement",
                    mjml: "<mjml><mj-head><mj-title>{{subject}}</mj-title><mj-preview>{{previewText}}</mj-preview></mj-head><mj-body background-color=\"#ffffff\"><mj-section><mj-column><mj-text align=\"center\" font-size=\"12px\" color=\"#94a3b8\">ANNOUNCEMENT</mj-text><mj-text align=\"center\" font-size=\"30px\" font-weight=\"700\" color=\"#0f172a\">{{headline}}</mj-text><mj-text align=\"center\" color=\"#475569\">{{message}}</mj-text><mj-button background-color=\"#0f172a\" href=\"https://example.com\">Learn more</mj-button></mj-column></mj-section></mj-body></mjml>"
                }
            ];
            var validationTimer = null;
            var previewTimer = null;
            var previewRequestId = 0;
            var previewRequest = null;
            var lastPreviewTemplate = null;
            var sidebarPreviewTabId = "mjml-parse-preview";
            var sidebarPreviewContentId = "mjml-parse-sidebar-preview-content";
            var supportsSidebarPreview = false;
            node._mjmlPreviewAbortController = null;
            node._mjmlPreviewTimer = null;
            node._mjmlPopupPreviewWindow = null;

            node.editor = RED.editor.createEditor({
                id: 'node-input-template-editor',
                mode: 'ace/mode/xml',
                stateId: stateId,
                value: $("#node-input-template").val()
            });

            if (!node.editor || typeof node.editor.getValue !== "function") {
                RED.notify("MJML editor initialization failed.", "error");
                return;
            }

            function ensureLintMarkerStyle() {
                if (document.getElementById("mjml-lint-marker-style")) {
                    return;
                }
                var style = document.createElement("style");
                style.id = "mjml-lint-marker-style";
                style.textContent =
                    ".ace_marker-layer .mjml-lint-line-error { position: absolute; background: rgba(198, 40, 40, 0.18); }" +
                    ".monaco-editor .view-overlays .mjml-lint-line-error { background: rgba(198, 40, 40, 0.22); }";
                document.head.appendChild(style);
            }
            ensureLintMarkerStyle();

            /**
             * Node-RED 3+ defaults to Monaco for RED.editor.createEditor().
             * The wrapper exposes getSession() === editor, but without Ace session.setAnnotations.
             * Use monaco.editor.setModelMarkers + deltaDecorations instead.
             */
            function isMonacoEditor() {
                return typeof window !== "undefined" && window.monaco && node.editor
                    && typeof node.editor.getModel === "function";
            }

            if (typeof node.editor.setOptions === "function") {
                node.editor.setOptions({
                    enableBasicAutocompletion: true,
                    enableLiveAutocompletion: true
                });
            } else if (typeof node.editor.setOption === "function") {
                node.editor.setOption("enableBasicAutocompletion", true);
                node.editor.setOption("enableLiveAutocompletion", true);
            }

            // Prevent password manager extensions from attaching to editor controls.
            $("#node-input-name, #node-input-template-picker, #node-input-template")
                .attr("autocomplete", "off")
                .attr("data-lpignore", "true")
                .attr("data-1p-ignore", "true")
                .attr("data-bwignore", "true")
                .attr("data-keeper-ignore", "true");
            $("#node-input-template-editor").find("textarea")
                .attr("autocomplete", "off")
                .attr("data-lpignore", "true")
                .attr("data-1p-ignore", "true")
                .attr("data-bwignore", "true")
                .attr("data-keeper-ignore", "true");

            function parseLineColumn(message) {
                var match = /line\s+(\d+).*column\s+(\d+)/i.exec(message);
                if (!match) {
                    match = /line\s*[:#]?\s*(\d+)[^\d]+col(?:umn)?\s*[:#]?\s*(\d+)/i.exec(message);
                }
                if (!match) {
                    match = /zeile\s+(\d+).*spalte\s+(\d+)/i.exec(message);
                }
                if (!match) {
                    return null;
                }
                return {
                    row: Math.max(0, parseInt(match[1], 10) - 1),
                    column: Math.max(0, parseInt(match[2], 10) - 1)
                };
            }

            function getXmlValidationElement() {
                var fromDialog = $("#dialog-form:visible #node-mjml-xml-validation");
                if (fromDialog.length) {
                    return fromDialog.last();
                }
                var fallback = $("#node-mjml-xml-validation");
                return fallback.length ? fallback.last() : fallback;
            }

            function getAllXmlValidationElements() {
                var inVisibleDialog = $("#dialog-form:visible #node-mjml-xml-validation");
                if (inVisibleDialog.length) {
                    return inVisibleDialog;
                }
                return $("#node-mjml-xml-validation");
            }

            function setValidationIndicator(state, details) {
                var indicators = getAllXmlValidationElements();
                if (!indicators.length) {
                    return;
                }
                if (state === "empty") {
                    indicators.text(resolveI18n("mjmlParse.template.validation.empty", "The node uses msg.payload when this editor is empty.")).css("color", "");
                    return;
                }
                if (state === "valid") {
                    indicators.text(resolveI18n("mjmlParse.template.validation.valid", "MJML template is well-formed XML.")).css("color", "#2e7d32");
                    return;
                }
                var message = resolveI18n("mjmlParse.template.validation.invalid", "MJML template is not valid XML.");
                if (details) {
                    message += " " + details;
                }
                indicators.text(message).css("color", "#c62828");
            }


            function findXmlMismatchLocation(source) {
                var lines = (source || "").split(/\r?\n/);
                var stack = [];

                for (var row = 0; row < lines.length; row += 1) {
                    var line = lines[row];
                    var matcher = /<\/?([a-zA-Z_][\w:.-]*)\b[^>]*\/?>/g;
                    var match;
                    while ((match = matcher.exec(line)) !== null) {
                        var token = match[0];
                        var tagName = (match[1] || "").toLowerCase();
                        var isClosing = /^<\//.test(token);
                        var isSelfClosing = /\/>$/.test(token) || /^<\?/.test(token) || /^<!/.test(token);
                        if (isSelfClosing) {
                            continue;
                        }

                        if (!isClosing) {
                            stack.push({ tagName: tagName, row: row, column: match.index });
                            continue;
                        }

                        var lastOpen = stack.length ? stack[stack.length - 1] : null;
                        if (!lastOpen || lastOpen.tagName !== tagName) {
                            return {
                                row: row,
                                column: match.index
                            };
                        }
                        stack.pop();
                    }
                }

                if (stack.length) {
                    return {
                        row: stack[stack.length - 1].row,
                        column: stack[stack.length - 1].column
                    };
                }

                return null;
            }

            function getCursorFallbackLocation() {
                try {
                    var cursor = node.editor && typeof node.editor.getCursorPosition === "function"
                        ? node.editor.getCursorPosition()
                        : null;
                    return {
                        row: cursor && typeof cursor.row === "number" ? Math.max(0, cursor.row) : 0,
                        column: cursor && typeof cursor.column === "number" ? Math.max(0, cursor.column) : 0
                    };
                } catch (error) {
                    return { row: 0, column: 0 };
                }
            }

            var xmlAnnotations = [];
            var mjmlAnnotations = [];
            var xmlMarkerIds = [];
            var mjmlMarkerIds = [];

            function getAceSession() {
                if (!node.editor || typeof node.editor.getSession !== "function") {
                    return null;
                }
                var session = node.editor.getSession();
                if (!session || typeof session.setAnnotations !== "function") {
                    return null;
                }
                return session;
            }

            function clearAceLineMarkers(markerIds) {
                var session = getAceSession();
                if (!session || typeof session.removeMarker !== "function") {
                    return [];
                }
                (markerIds || []).forEach(function (id) {
                    try {
                        session.removeMarker(id);
                    } catch (error) {
                        // Ignore stale marker ids.
                    }
                });
                return [];
            }

            function applyRowHighlights(annotations, markerIds, cssClass) {
                if (isMonacoEditor() && typeof node.editor.deltaDecorations === "function") {
                    var model = node.editor.getModel();
                    if (!model || (typeof model.isDisposed === "function" && model.isDisposed())) {
                        return [];
                    }
                    var RangeCtor = window.monaco && window.monaco.Range;
                    if (!RangeCtor) {
                        return markerIds || [];
                    }
                    var previousIds = Array.isArray(markerIds) ? markerIds : [];
                    var newDecorations = (annotations || []).reduce(function (accumulator, annotation) {
                        var row = annotation && typeof annotation.row === "number" ? Math.max(0, annotation.row) : null;
                        if (row === null) {
                            return accumulator;
                        }
                        var lineNumber = row + 1;
                        var maxColumn = 1;
                        try {
                            maxColumn = Math.max(1, model.getLineMaxColumn(lineNumber));
                        } catch (error) {
                            maxColumn = 1;
                        }
                        accumulator.push({
                            range: new RangeCtor(lineNumber, 1, lineNumber, maxColumn),
                            options: {
                                isWholeLine: true,
                                className: cssClass
                            }
                        });
                        return accumulator;
                    }, []);
                    return node.editor.deltaDecorations(previousIds, newDecorations);
                }

                var session = getAceSession();
                if (!session || typeof session.addMarker !== "function") {
                    return markerIds || [];
                }
                if (typeof ace === "undefined" || !ace.require) {
                    return markerIds || [];
                }
                var Range = ace.require("ace/range").Range;
                if (!Range) {
                    return markerIds || [];
                }

                var nextMarkerIds = clearAceLineMarkers(markerIds);
                (annotations || []).forEach(function (annotation) {
                    var row = annotation && typeof annotation.row === "number" ? Math.max(0, annotation.row) : null;
                    if (row === null) {
                        return;
                    }
                    var lineLength = 1;
                    if (typeof session.getLine === "function") {
                        var lineContent = session.getLine(row);
                        lineLength = Math.max(1, (lineContent || "").length);
                    }
                    var markerId = session.addMarker(
                        new Range(row, 0, row, lineLength),
                        cssClass,
                        "fullLine",
                        false
                    );
                    if (typeof markerId === "number") {
                        nextMarkerIds.push(markerId);
                    }
                });
                return nextMarkerIds;
            }

            function applyEditorAnnotations() {
                var combined = xmlAnnotations.concat(mjmlAnnotations);
                if (isMonacoEditor()) {
                    var model = node.editor.getModel();
                    if (!model || (typeof model.isDisposed === "function" && model.isDisposed())) {
                        return;
                    }
                    var monacoMarkers = combined.map(function (annotation) {
                        var row = annotation && typeof annotation.row === "number" ? Math.max(0, annotation.row) : 0;
                        var col = annotation && typeof annotation.column === "number" ? Math.max(0, annotation.column) : 0;
                        var lineNumber = row + 1;
                        var startColumn = col + 1;
                        var endLineNumber = annotation && typeof annotation.endRow === "number"
                            ? Math.max(0, annotation.endRow) + 1
                            : lineNumber;
                        var endColumn;
                        if (annotation && typeof annotation.endColumn === "number") {
                            endColumn = Math.max(1, annotation.endColumn + 1);
                        } else {
                            try {
                                endColumn = Math.max(1, model.getLineMaxColumn(lineNumber));
                            } catch (error) {
                                endColumn = startColumn + 1;
                            }
                        }
                        var severity = window.monaco.MarkerSeverity
                            ? window.monaco.MarkerSeverity.Error
                            : 8;
                        return {
                            severity: severity,
                            startLineNumber: lineNumber,
                            startColumn: startColumn,
                            endLineNumber: endLineNumber,
                            endColumn: endColumn,
                            message: (annotation && annotation.text) || ""
                        };
                    });
                    window.monaco.editor.setModelMarkers(model, "mjml-parse", monacoMarkers);
                    return;
                }

                var aceSession = getAceSession();
                if (!aceSession) {
                    return;
                }
                aceSession.setAnnotations(combined);
            }

            function setXmlAnnotations(annotations) {
                xmlAnnotations = Array.isArray(annotations) ? annotations : [];
                xmlMarkerIds = applyRowHighlights(xmlAnnotations, xmlMarkerIds, "mjml-lint-line-error");
                node._mjmlMonacoXmlDecoIds = xmlMarkerIds;
                applyEditorAnnotations();
            }

            function setMjmlAnnotations(annotations) {
                mjmlAnnotations = Array.isArray(annotations) ? annotations : [];
                mjmlMarkerIds = applyRowHighlights(mjmlAnnotations, mjmlMarkerIds, "mjml-lint-line-error");
                node._mjmlMonacoMjmlDecoIds = mjmlMarkerIds;
                applyEditorAnnotations();
            }

            function clearEditorLintVisuals() {
                if (isMonacoEditor() && node.editor) {
                    var model = node.editor.getModel();
                    if (model && (typeof model.isDisposed !== "function" || !model.isDisposed())) {
                        window.monaco.editor.setModelMarkers(model, "mjml-parse", []);
                    }
                    if (typeof node.editor.deltaDecorations === "function") {
                        var allDecos = [].concat(
                            node._mjmlMonacoXmlDecoIds || [],
                            node._mjmlMonacoMjmlDecoIds || []
                        );
                        node.editor.deltaDecorations(allDecos, []);
                    }
                    node._mjmlMonacoXmlDecoIds = [];
                    node._mjmlMonacoMjmlDecoIds = [];
                    xmlMarkerIds = [];
                    mjmlMarkerIds = [];
                } else {
                    xmlMarkerIds = clearAceLineMarkers(xmlMarkerIds);
                    mjmlMarkerIds = clearAceLineMarkers(mjmlMarkerIds);
                    var aceSession = getAceSession();
                    if (aceSession && typeof aceSession.clearAnnotations === "function") {
                        aceSession.clearAnnotations();
                    }
                }
            }

            node._mjmlClearEditorLint = clearEditorLintVisuals;

            function validateXml() {
                var editorValue = node.editor.getValue() || "";
                var xmlForValidation = editorValue.replace(/\{\{\{?[\s\S]*?\}?\}\}/g, "mjml_placeholder");
                var parser = new DOMParser();
                var doc = parser.parseFromString(xmlForValidation, "application/xml");
                var parserError = doc.querySelector("parsererror");
                if (!editorValue.trim()) {
                    setXmlAnnotations([]);
                    setValidationIndicator("empty");
                    return;
                }

                if (!parserError) {
                    setXmlAnnotations([]);
                    setValidationIndicator("valid");
                    return;
                }

                var message = parserError.textContent.replace(/\s+/g, " ").trim();
                var location = parseLineColumn(message);
                if (!location) {
                    location = findXmlMismatchLocation(editorValue);
                }
                var annotations = [];
                if (location) {
                    annotations.push({
                        row: location.row,
                        column: location.column,
                        text: RED._("mjmlParse.template.validation.invalid"),
                        type: "error"
                    });
                } else {
                    var xmlFallbackLocation = getCursorFallbackLocation();
                    annotations.push({
                        row: xmlFallbackLocation.row,
                        column: xmlFallbackLocation.column,
                        text: message || RED._("mjmlParse.template.validation.invalid"),
                        type: "error"
                    });
                }
                setXmlAnnotations(annotations);

                setValidationIndicator("invalid", message);
            }

            function scheduleValidation() {
                if (validationTimer) {
                    clearTimeout(validationTimer);
                }
                validationTimer = setTimeout(validateXml, 300);
            }

            function resolveI18n(key, fallback) {
                var translated = null;
                if (node && typeof node._ === "function") {
                    translated = node._(key);
                }
                if (!translated || translated === key) {
                    translated = RED._(key);
                }
                if (!translated || translated === key) {
                    return fallback;
                }
                return translated;
            }

            function setupTemplatePicker() {
                var $templatePicker = $("#node-input-template-picker");
                if (!$templatePicker.length) {
                    return;
                }

                function resetPicker() {
                    $templatePicker.val("");
                }

                function renderOptions(templates) {
                    $templatePicker.empty();
                    $templatePicker.append(
                        $("<option>", {
                            value: "",
                            text: resolveI18n("mjmlParse.templates.none", "No starter template")
                        })
                    );

                    templates.forEach(function (template) {
                        if (!template || typeof template.id !== "string" || typeof template.mjml !== "string") {
                            return;
                        }
                        $templatePicker.append(
                            $("<option>", {
                                value: template.id,
                                text: resolveI18n(template.labelKey, template.id)
                            }).data("mjml", template.mjml)
                        );
                    });
                    resetPicker();
                }

                renderOptions(fallbackTemplates);

                function applyTemplate(mjmlTemplate) {
                    var formattedTemplate = beautifyXml(mjmlTemplate) || mjmlTemplate;
                    node.editor.setValue(formattedTemplate, -1);
                    scheduleValidation();
                    schedulePreview();
                    resetPicker();
                }

                function confirmReplaceDialog(message, onDecision) {
                    var confirmTitle = resolveI18n("mjmlParse.templates.confirmTitle", "Replace template");
                    var cancelText = resolveI18n("mjmlParse.templates.confirmCancel", "Cancel");
                    var replaceText = resolveI18n("mjmlParse.templates.confirmAction", "Replace");

                    $("<div></div>")
                        .text(message)
                        .dialog({
                            title: confirmTitle,
                            modal: true,
                            resizable: false,
                            width: 420,
                            close: function () {
                                $(this).dialog("destroy").remove();
                            },
                            buttons: [
                                {
                                    text: cancelText,
                                    click: function () {
                                        $(this).dialog("close");
                                        onDecision(false);
                                    }
                                },
                                {
                                    text: replaceText,
                                    class: "primary",
                                    click: function () {
                                        $(this).dialog("close");
                                        onDecision(true);
                                    }
                                }
                            ]
                        });
                }

                $templatePicker.off("change").on("change", function () {
                    var selectedId = $templatePicker.val();
                    if (!selectedId) {
                        return;
                    }

                    var selectedOption = $templatePicker.find("option:selected");
                    var mjmlTemplate = selectedOption.data("mjml");
                    if (typeof mjmlTemplate !== "string" || !mjmlTemplate.trim()) {
                        resetPicker();
                        return;
                    }

                    var existingValue = (node.editor.getValue() || "").trim();
                    if (existingValue) {
                        var confirmMessage = resolveI18n(
                            "mjmlParse.templates.confirmReplace",
                            "Replace the current editor content with the selected starter template?"
                        );
                        confirmReplaceDialog(confirmMessage, function (shouldReplace) {
                            if (!shouldReplace) {
                                resetPicker();
                                return;
                            }
                            applyTemplate(mjmlTemplate);
                        });
                        return;
                    }
                    applyTemplate(mjmlTemplate);
                });
            }

            function beautifyXml(xmlSource) {
                var placeholders = [];
                var sanitized = (xmlSource || "").replace(/\{\{\{?[\s\S]*?\}?\}\}/g, function (match) {
                    var token = "__MJML_PLACEHOLDER_" + placeholders.length + "__";
                    placeholders.push({ token: token, value: match });
                    return token;
                });

                var parser = new DOMParser();
                var doc = parser.parseFromString(sanitized, "application/xml");
                if (doc.querySelector("parsererror")) {
                    return null;
                }

                function escapeText(text) {
                    return String(text)
                        .replace(/&/g, "&amp;")
                        .replace(/</g, "&lt;")
                        .replace(/>/g, "&gt;");
                }

                function escapeAttribute(text) {
                    return escapeText(text).replace(/"/g, "&quot;");
                }

                function restorePlaceholders(text) {
                    return placeholders.reduce(function (accumulator, item) {
                        return accumulator.split(item.token).join(item.value);
                    }, text);
                }

                function serializeNode(node, level) {
                    var indent = "  ".repeat(level);
                    var nextIndent = "  ".repeat(level + 1);

                    if (node.nodeType === Node.TEXT_NODE) {
                        var text = node.nodeValue || "";
                        if (!text.trim()) {
                            return "";
                        }
                        return indent + escapeText(text.trim()) + "\n";
                    }

                    if (node.nodeType !== Node.ELEMENT_NODE) {
                        return "";
                    }

                    var attributes = Array.prototype.map.call(node.attributes || [], function (attr) {
                        return " " + attr.name + "=\"" + escapeAttribute(attr.value) + "\"";
                    }).join("");

                    var childNodes = Array.prototype.filter.call(node.childNodes || [], function (child) {
                        if (child.nodeType === Node.TEXT_NODE) {
                            return (child.nodeValue || "").trim().length > 0;
                        }
                        return child.nodeType === Node.ELEMENT_NODE;
                    });

                    if (!childNodes.length) {
                        return indent + "<" + node.nodeName + attributes + " />\n";
                    }

                    if (childNodes.length === 1 && childNodes[0].nodeType === Node.TEXT_NODE) {
                        return (
                            indent +
                            "<" + node.nodeName + attributes + ">" +
                            escapeText((childNodes[0].nodeValue || "").trim()) +
                            "</" + node.nodeName + ">\n"
                        );
                    }

                    var content = indent + "<" + node.nodeName + attributes + ">\n";
                    childNodes.forEach(function (child) {
                        if (child.nodeType === Node.TEXT_NODE) {
                            content += nextIndent + escapeText((child.nodeValue || "").trim()) + "\n";
                            return;
                        }
                        content += serializeNode(child, level + 1);
                    });
                    content += indent + "</" + node.nodeName + ">\n";
                    return content;
                }

                var root = doc.documentElement;
                if (!root) {
                    return null;
                }
                var formatted = serializeNode(root, 0);
                return restorePlaceholders(formatted.trim());
            }

            function runBeautify(editorInstance) {
                if (!editorInstance || typeof editorInstance.getValue !== "function") {
                    return;
                }
                var currentValue = editorInstance.getValue();
                if (!currentValue || !currentValue.trim()) {
                    return;
                }
                var formatted = beautifyXml(currentValue);
                if (!formatted) {
                    RED.notify("Unable to beautify: XML is not well-formed.", "warning");
                    return;
                }
                if (typeof editorInstance.setValue === "function") {
                    editorInstance.setValue(formatted, -1);
                }
                scheduleValidation();
                schedulePreview();
            }


            function ensureSidebarPreviewTab() {
                if (!RED.sidebar || typeof RED.sidebar.addTab !== "function") {
                    return false;
                }
                if ($("#" + sidebarPreviewContentId).length) {
                    return true;
                }
                try {
                    var previewTabLabel = resolveI18n("mjmlParse.preview.label", "MJML preview");
                    RED.sidebar.addTab({
                        id: sidebarPreviewTabId,
                        label: previewTabLabel,
                        name: previewTabLabel,
                        iconClass: "fa fa-eye",
                        content: $("<div>", {
                            id: sidebarPreviewContentId,
                            style: "padding:8px; height:100%; overflow:auto; background:#fff;"
                        })
                    });
                    return true;
                } catch (error) {
                    return $("#" + sidebarPreviewContentId).length > 0;
                }
            }

            function ensurePopupPreviewWindow() {
                if (node._mjmlPopupPreviewWindow && !node._mjmlPopupPreviewWindow.closed) {
                    return node._mjmlPopupPreviewWindow;
                }
                node._mjmlPopupPreviewWindow = window.open("", "mjml-parse-preview-window");
                if (!node._mjmlPopupPreviewWindow) {
                    return null;
                }
                node._mjmlPopupPreviewWindow.document.title = resolveI18n("mjmlParse.preview.label", "MJML preview");
                return node._mjmlPopupPreviewWindow;
            }

            function setPopupPreviewHtml(html) {
                var popup = ensurePopupPreviewWindow();
                if (!popup) {
                    return false;
                }
                var safeHtml = html || "";
                popup.document.open();
                popup.document.write(safeHtml);
                popup.document.close();
                popup.focus();
                return true;
            }

            function setSidebarPreviewHtml(html) {
                if (supportsSidebarPreview) {
                    var previewElement = $("#" + sidebarPreviewContentId);
                    if (previewElement.length) {
                        previewElement.html(html || "");
                        if (RED.sidebar && typeof RED.sidebar.show === "function") {
                            RED.sidebar.show(sidebarPreviewTabId);
                        }
                        return;
                    }
                }
                setPopupPreviewHtml(html || "");
            }

            function renderPreview() {
                var editorValue = node.editor.getValue() || "";

                if (!editorValue.trim()) {
                    lastPreviewTemplate = null;
                    setMjmlAnnotations([]);
                    setSidebarPreviewHtml("");
                    return;
                }

                if (editorValue === lastPreviewTemplate) {
                    return;
                }
                lastPreviewTemplate = editorValue;

                if (previewRequest && typeof previewRequest.abort === "function") {
                    previewRequest.abort();
                }

                previewRequest = null;
                node._mjmlPreviewAbortController = null;
                previewRequestId += 1;
                var requestId = previewRequestId;

                previewRequest = $.ajax({
                    url: previewEndpoint,
                    method: "POST",
                    data: JSON.stringify({ template: editorValue }),
                    contentType: "application/json; charset=utf-8",
                    dataType: "json"
                });
                node._mjmlPreviewAbortController = previewRequest;

                previewRequest
                    .done(function (payload) {
                        if (requestId !== previewRequestId) {
                            return;
                        }

                        payload = payload || {};
                        var errors = Array.isArray(payload.errors) ? payload.errors : [];
                        var validationErrors = Array.isArray(payload.validationErrors) ? payload.validationErrors : [];
                        var html = typeof payload.html === "string" ? payload.html : "";

                        var annotations = validationErrors.reduce(function (accumulator, error) {
                            if (!error || typeof error !== "object") {
                                return accumulator;
                            }
                            if (typeof error.line !== "number") {
                                return accumulator;
                            }

                            var row = Math.max(0, error.line - 1);
                            var column = typeof error.column === "number"
                                ? Math.max(0, error.column - 1)
                                : 0;
                            var text = error.message || errors[0] || RED._("mjmlParse.preview.error");
                            accumulator.push({
                                row: row,
                                column: column,
                                text: text,
                                type: "error"
                            });
                            return accumulator;
                        }, []);

                        if (!annotations.length) {
                            var firstLocation = parseLineColumn(errors[0] || "");
                            if (firstLocation) {
                                annotations.push({
                                    row: firstLocation.row,
                                    column: firstLocation.column,
                                    text: errors[0],
                                    type: "error"
                                });
                            } else if (errors.length) {
                                var mjmlFallbackLocation = getCursorFallbackLocation();
                                annotations.push({
                                    row: mjmlFallbackLocation.row,
                                    column: mjmlFallbackLocation.column,
                                    text: errors[0],
                                    type: "error"
                                });
                            }
                        }

                        if (html) {
                            setSidebarPreviewHtml(html);
                        } else {
                            setSidebarPreviewHtml("");
                        }

                        setMjmlAnnotations(annotations);
                        if (errors.length) {
                            setValidationIndicator("invalid", errors[0]);
                            return;
                        }
                        if (!xmlAnnotations.length) {
                            setValidationIndicator("valid");
                        }
                    })
                    .fail(function (jqXHR, textStatus) {
                        if (textStatus === "abort") {
                            return;
                        }
                        if (requestId !== previewRequestId) {
                            return;
                        }
                        var responsePayload = jqXHR && jqXHR.responseJSON ? jqXHR.responseJSON : {};
                        var errors = Array.isArray(responsePayload.errors) ? responsePayload.errors : [];
                        var validationErrors = Array.isArray(responsePayload.validationErrors) ? responsePayload.validationErrors : [];
                        var annotations = validationErrors.reduce(function (accumulator, error) {
                            if (!error || typeof error !== "object" || typeof error.line !== "number") {
                                return accumulator;
                            }
                            accumulator.push({
                                row: Math.max(0, error.line - 1),
                                column: typeof error.column === "number" ? Math.max(0, error.column - 1) : 0,
                                text: error.message || errors[0] || RED._("mjmlParse.preview.error"),
                                type: "error"
                            });
                            return accumulator;
                        }, []);
                        if (!annotations.length) {
                            var firstLocation = parseLineColumn(errors[0] || "");
                            if (firstLocation) {
                                annotations.push({
                                    row: firstLocation.row,
                                    column: firstLocation.column,
                                    text: errors[0],
                                    type: "error"
                                });
                            } else if (errors.length) {
                                var mjmlFailFallbackLocation = getCursorFallbackLocation();
                                annotations.push({
                                    row: mjmlFailFallbackLocation.row,
                                    column: mjmlFailFallbackLocation.column,
                                    text: errors[0],
                                    type: "error"
                                });
                            }
                        }
                        setMjmlAnnotations(annotations);
                        setSidebarPreviewHtml("");
                        var details = errors.length
                            ? errors[0]
                            : ((jqXHR && jqXHR.statusText) || "Preview request failed.");
                        setValidationIndicator("invalid", details);
                    });
            }

            function schedulePreview() {
                if (previewTimer) {
                    clearTimeout(previewTimer);
                }
                previewTimer = setTimeout(renderPreview, 500);
                node._mjmlPreviewTimer = previewTimer;
            }

            function attachCompleter(tags, attributes, tagAttributes) {
                var langTools = ace.require("ace/ext/language_tools");
                if (!langTools) {
                    return;
                }

                function unique(values) {
                    var seen = {};
                    return (values || []).filter(function (value) {
                        if (!value || seen[value]) {
                            return false;
                        }
                        seen[value] = true;
                        return true;
                    });
                }

                function findOpenTag(lineBeforeCursor) {
                    var stack = [];
                    var matcher = /<\/?([a-zA-Z][\w:-]*)\b[^>]*>/g;
                    var match;
                    while ((match = matcher.exec(lineBeforeCursor)) !== null) {
                        var token = match[0];
                        var name = (match[1] || "").toLowerCase();
                        var isClosing = /^<\//.test(token);
                        var isSelfClosing = /\/>$/.test(token);
                        if (isClosing) {
                            stack.pop();
                        } else if (!isSelfClosing) {
                            stack.push(name);
                        }
                    }
                    return stack.length ? stack[stack.length - 1] : null;
                }

                function getTagAtAttributeContext(lineBeforeCursor) {
                    var openTagMatch = lineBeforeCursor.match(/<([a-zA-Z][\w:-]*)\b[^>]*$/);
                    if (openTagMatch && openTagMatch[1]) {
                        return openTagMatch[1].toLowerCase();
                    }
                    return findOpenTag(lineBeforeCursor);
                }

                var completer = {
                    getCompletions: function (editor, session, pos, prefix, callback) {
                        var line = session.getLine(pos.row).slice(0, pos.column);
                        var suggestions = [];

                        if (/<\/?mj[-\w]*$/i.test(line)) {
                            suggestions = tags.map(function (tag) {
                                return {
                                    caption: "<" + tag + ">",
                                    value: tag,
                                    meta: "mjml-tag"
                                };
                            });
                        } else if (/<\w[\w-]*\s+[^>]*$/i.test(line) && !/=\s*["'][^"']*$/.test(line)) {
                            var activeTag = getTagAtAttributeContext(line);
                            var contextAttributes = activeTag && tagAttributes && Array.isArray(tagAttributes[activeTag])
                                ? tagAttributes[activeTag]
                                : [];
                            var mergedAttributes = unique(contextAttributes.concat(attributes || []));
                            suggestions = mergedAttributes.map(function (attr) {
                                return {
                                    caption: attr + '=""',
                                    value: attr + '=""',
                                    meta: "mjml-attr"
                                };
                            });
                        }

                        if (!suggestions.length) {
                            callback(null, []);
                            return;
                        }

                        callback(null, suggestions);
                    }
                };

                langTools.addCompleter(completer);
            }

            attachCompleter(fallbackTags, fallbackAttributes, {});

            var changeTarget = node.editor && typeof node.editor.getSession === "function"
                ? node.editor.getSession()
                : node.editor;
            if (changeTarget && typeof changeTarget.on === "function") {
                changeTarget.on("change", function () {
                    scheduleValidation();
                    schedulePreview();
                });
            }
            supportsSidebarPreview = ensureSidebarPreviewTab();
            setupTemplatePicker();
            scheduleValidation();
            schedulePreview();

            RED.popover.tooltip($("#node-template-expand-editor"), RED._("node-red:common.label.expand"));
            RED.popover.tooltip(
                $("#node-template-beautify-editor"),
                resolveI18n("mjmlParse.template.beautify", "Beautify XML")
            );
            $("#node-template-beautify-label")
                .text(resolveI18n("mjmlParse.template.beautify", "Beautify XML"));
            $("#node-template-expand-editor").on("click", function (e) {
                e.preventDefault();
                var value = node.editor.getValue();
                node.editor.saveView();
                RED.editor.editText({
                    mode: "xml",
                    value: value,
                    stateId: stateId,
                    width: "Infinity",
                    focus: true,
                    complete: function (v) {
                        node.editor.setValue(v, -1);
                        setTimeout(function () {
                            node.editor.restoreView();
                            node.editor.focus();
                        }, 250);
                    }
                });
            });
            $("#node-template-beautify-editor").on("click", function (e) {
                e.preventDefault();
                runBeautify(node.editor);
            });
        },
        oneditsave: function () {
            $("#node-input-template").val(this.editor.getValue());
            if (this._mjmlPreviewTimer) {
                clearTimeout(this._mjmlPreviewTimer);
                this._mjmlPreviewTimer = null;
            }
            if (this._mjmlPreviewAbortController) {
                this._mjmlPreviewAbortController.abort();
                this._mjmlPreviewAbortController = null;
            }
            if (typeof this._mjmlClearEditorLint === "function") {
                this._mjmlClearEditorLint();
            }
            if (this._mjmlPopupPreviewWindow && !this._mjmlPopupPreviewWindow.closed) {
                this._mjmlPopupPreviewWindow.close();
                this._mjmlPopupPreviewWindow = null;
            }
            this.editor.destroy();
            delete this.editor;
            delete this._mjmlClearEditorLint;
        },
        oneditcancel: function () {
            if (this._mjmlPreviewTimer) {
                clearTimeout(this._mjmlPreviewTimer);
                this._mjmlPreviewTimer = null;
            }
            if (this._mjmlPreviewAbortController) {
                this._mjmlPreviewAbortController.abort();
                this._mjmlPreviewAbortController = null;
            }
            if (typeof this._mjmlClearEditorLint === "function") {
                this._mjmlClearEditorLint();
            }
            if (this._mjmlPopupPreviewWindow && !this._mjmlPopupPreviewWindow.closed) {
                this._mjmlPopupPreviewWindow.close();
                this._mjmlPopupPreviewWindow = null;
            }
            this.editor.destroy();
            delete this.editor;
            delete this._mjmlClearEditorLint;
        },
        oneditresize: function (size) {
            var rows = $("#dialog-form>div:not(.node-text-editor-row)");
            var height = $("#dialog-form").height();
            for (var i = 0; i < rows.length; i++) {
                height -= $(rows[i]).outerHeight(true);
            }
            var editorRow = $("#dialog-form>div.node-text-editor-row");
            height -= (parseInt(editorRow.css("marginTop"), 10) + parseInt(editorRow.css("marginBottom"), 10));
            $("#node-mjml-editor-container").css("height", height + "px");
            $("#node-mjml-editor-pane").css("height", height + "px");
            $("#node-input-template-editor").css("height", height + "px");
            if (this.editor) {
                this.editor.resize();
            }
        }
    });
</script>

<script type="text/html" data-template-name="mjml-parse">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> <span data-i18n="mjmlParse.name.label"></span></label>
        <input type="text" id="node-input-name" data-i18n="[placeholder]mjmlParse.name.placeholder" autocomplete="off" data-lpignore="true" data-1p-ignore="true" data-bwignore="true" data-keeper-ignore="true">
    </div>
    <div class="form-row">
        <label for="node-input-template-picker"><i class="fa fa-copy"></i> <span data-i18n="mjmlParse.templates.label"></span></label>
        <select id="node-input-template-picker" autocomplete="off" data-lpignore="true" data-1p-ignore="true" data-bwignore="true" data-keeper-ignore="true"></select>
    </div>
    <div class="form-row">
        <div id="node-mjml-xml-validation" class="form-tips" data-i18n="mjmlParse.template.validation.empty"></div>
    </div>
    <div class="form-row node-text-editor-row">
        <label for="node-input-template"><i class="fa fa-code"></i> <span data-i18n="mjmlParse.template.label"></span></label>
        <input type="hidden" id="node-input-template" autocomplete="off" data-lpignore="true" data-1p-ignore="true" data-bwignore="true" data-keeper-ignore="true">
        <div id="node-mjml-editor-container" style="height:420px;">
            <div id="node-mjml-editor-pane" style="position:relative; height:100%;">
                <div id="node-input-template-editor" style="position:absolute; inset:0;"></div>
                <button id="node-template-expand-editor" class="editor-button editor-button-small" style="position:absolute; left:0; margin-left:4px; margin-top:4px; z-index:2;">
                    <i class="fa fa-expand"></i>
                </button>
                <button id="node-template-beautify-editor" class="editor-button editor-button-small" style="position:absolute; left:0; margin-left:34px; margin-top:4px; z-index:2; padding:0 8px;">
                    <i class="fa fa-align-left" style="margin-right:4px;"></i><span id="node-template-beautify-label"></span>
                </button>
            </div>
        </div>
    </div>
</script>
