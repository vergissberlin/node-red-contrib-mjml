 ![MJML](https://documentation.mjml.io/images/logo.png)

একটি নোড যা এমজেএমএলকে ইমেলের জন্য প্রতিক্রিয়াশীল HTML-এ কম্পাইল করে।

### ইনপুট

: payload (string) : নোড এডিটরে কোনো টেমপ্লেট কনফিগার করা না থাকলে MJML মার্কআপ।
: template (string) : ঐচ্ছিক রানটাইম MJML টেমপ্লেট (এডিটর টেমপ্লেট খালি থাকলেই ব্যবহার করা হয়)।

### আউটপুট


1. স্ট্যান্ডার্ড আউটপুট
: payload (string) : ইমেলে ব্যবহার করার জন্য MJML-কে HTML-এ পার্স করা হয়েছে।

2. স্ট্যান্ডার্ড ত্রুটি
: payload (string) : কমান্ডের আদর্শ ত্রুটি।

### বিস্তারিত

নোডটি মূল টেমপ্লেট নোডের মতোই গোঁফ সিনট্যাক্স (উদাহরণস্বরূপ `{{payload}}`) ব্যবহার করে স্থানধারককে রেন্ডার করতে পারে।

টেমপ্লেট উত্স অগ্রাধিকার:
1. সম্পাদক টেমপ্লেট (নোডে কনফিগার করা হয়েছে)
2. `msg.template`
3. `msg.payload`

টাইপ করার সময় সম্পাদক XML সুগঠিততা যাচাই করে। MJML শব্দার্থিক বৈধতা রানটাইম সংকলনের সময় ঘটে।
