צומת שמרכיב MJML ל-HTML רספונסיבי עבור מיילים.

### תשומות

: payload (string) : סימון MJML כאשר לא מוגדרת תבנית בעורך הצומת.
: template (string) : תבנית MJML בזמן ריצה אופציונלית (משמשת רק כאשר תבנית העורך ריקה).

### פלטים


1. פלט סטנדרטי
: payload (string) : ניתוח MJML ל-HTML כדי להשתמש בו באימיילים.

2. שגיאה רגילה
: payload (string) : השגיאה הסטנדרטית של הפקודה.

### פרטים

הצומת יכול להציג מצייני מיקום באמצעות תחביר שפם (לדוגמה `{{payload}}`), בדומה לצומת הליבה Template.

עדיפות מקור התבנית:
1. תבנית עורך (מוגדרת בצומת)
2. `msg.template`
3. `msg.payload`

העורך מאמת את צורת ה-XML בזמן ההקלדה. אימות סמנטי של MJML מתרחש במהלך הידור בזמן ריצה.
