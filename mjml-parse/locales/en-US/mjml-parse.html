A node that compiles MJML into responsive HTML for emails.

### Inputs

: payload (string) : MJML markup when no template is configured in the node editor.
: template (string) : optional runtime MJML template (used only when the editor template is empty).

### Outputs


1. Standard output
: payload (string) : Parsed MJML to HTML to use it in emails.

2. Standard error
: payload (string) : the standard error of the command.

### Details

The node can render placeholders using Mustache syntax (for example `{{payload}}`), similar to the core Template node.

Template source priority:
1. Editor template (configured in the node)
2. `msg.template`
3. `msg.payload`

The editor validates XML well-formedness while typing. MJML semantic validation happens during runtime compilation.

- [MJML templates](https://mjml.io/templates)
