 ![MJML](https://documentation.mjml.io/images/logo.png)

Un node que compila MJML en HTML responsiu per a correus electrònics.

### Entrades

: payload (string) : Marcat MJML quan no hi ha cap plantilla configurada a l'editor de nodes.
: template (string) : plantilla MJML en temps d'execució opcional (només s'utilitza quan la plantilla de l'editor està buida).

### Sortides


1. Sortida estàndard
: payload (string) : S'ha analitzat MJML a HTML per utilitzar-lo als correus electrònics.

2. Error estàndard
: payload (string) : l'error estàndard de l'ordre.

### Detalls

El node pot representar marcadors de posició utilitzant la sintaxi de Mustache (per exemple, `{{payload}}`), de manera similar al node Plantilla principal.

Prioritat font de la plantilla:
1. Plantilla d'editor (configurada al node)
2. `msg.template`
3. `msg.payload`

L'editor valida el bon format d'XML mentre escriu. La validació semàntica MJML es produeix durant la compilació en temps d'execució.
