 ![MJML](https://documentation.mjml.io/images/logo.png)

Um nó que compila MJML em HTML responsivo para emails.

### Entradas

: payload (string) : Marcação MJML quando nenhum modelo está configurado no editor de nó.
: template (string) : modelo MJML de tempo de execução opcional (usado apenas quando o modelo do editor está vazio).

### Resultados


1. Saída padrão
: payload (string) : Analisou MJML em HTML para usá-lo em e-mails.

2. Erro padrão
: payload (string) : o erro padrão do comando.

### Detalhes

O nó pode renderizar espaços reservados usando a sintaxe Moustache (por exemplo `{{payload}}`), semelhante ao nó principal do Template.

Prioridade de origem do modelo:
1. Modelo de editor (configurado no nó)
2. `msg.template`
3. `msg.payload`

O editor valida a boa formação do XML durante a digitação. A validação semântica MJML acontece durante a compilação em tempo de execução.
