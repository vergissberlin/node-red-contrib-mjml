 ![MJML](https://documentation.mjml.io/images/logo.png)

Ein Node, der MJML in responsives HTML für E-Mails kompiliert.

### Inputs

: payload (string) : MJML-Markup, wenn keine Vorlage im Node-Editor gesetzt ist.
: template (string) : optionale Laufzeit-MJML-Vorlage (wird nur genutzt, wenn die Editor-Vorlage leer ist).

### Outputs


1. Standard output
: payload (string) : Parsed MJML to HTML to use it in emails.

2. Standard error
: payload (string) : the standard error of the command.

### Details

Der Node kann Platzhalter mit Mustache-Syntax rendern (zum Beispiel `{{payload}}`), analog zum Core-Template-Node.

Priorität der Vorlagenquelle:
1. Editor-Vorlage (im Node konfiguriert)
2. `msg.template`
3. `msg.payload`

Der Editor prüft beim Tippen, ob das XML wohlgeformt ist. Die MJML-semantische Validierung passiert zur Laufzeit beim Kompilieren.


### References

- [MJML templates](https://mjml.io/templates)
