Ein Knoten, der MJML in responsives HTML für E-Mails kompiliert.

### Eingaben

: payload (string) : MJML-Markup, wenn im Knoteneditor keine Vorlage konfiguriert ist.
: template (string) : optionale Laufzeit-MJML-Vorlage (wird nur verwendet, wenn die Editor-Vorlage leer ist).

### Ausgaben


1. Standardausgabe
: payload (string) : Zu HTML kompiliertes MJML zur Verwendung in E-Mails.

2. Standardfehler
: payload (string) : Standardfehlerausgabe des Befehls.

### Details

Der Knoten kann Platzhalter mithilfe der Mustache-Syntax (z. B. `{{payload}}`) rendern, ähnlich wie der Kern-Template-Knoten.

Priorität der Vorlagenquelle:
1. Editor-Vorlage (konfiguriert im Knoten)
2. `msg.template`
3. `msg.payload`

Der Editor überprüft die Wohlgeformtheit von XML während der Eingabe. Die semantische Validierung von MJML erfolgt während der Laufzeitkompilierung.
