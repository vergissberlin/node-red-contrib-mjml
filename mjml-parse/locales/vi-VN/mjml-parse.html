Một nút biên dịch MJML thành HTML đáp ứng cho email.

### Đầu vào

: payload (string) : Đánh dấu MJML khi không có mẫu nào được định cấu hình trong trình chỉnh sửa nút.
: template (string) : mẫu MJML thời gian chạy tùy chọn (chỉ được sử dụng khi mẫu trình soạn thảo trống).

### đầu ra


1. Đầu ra tiêu chuẩn
: payload (string) : Đã phân tích MJML thành HTML để sử dụng nó trong email.

2. Lỗi tiêu chuẩn
: payload (string) : lỗi tiêu chuẩn của lệnh.

### Chi tiết

Nút có thể hiển thị phần giữ chỗ bằng cú pháp Mustache (ví dụ `{{payload}}`), tương tự như nút Mẫu cốt lõi.

Ưu tiên nguồn mẫu:
1. Mẫu trình soạn thảo (được định cấu hình trong nút)
2. `msg.template`
3. `msg.payload`

Trình soạn thảo xác nhận tính đúng đắn của XML trong khi nhập. Xác thực ngữ nghĩa MJML xảy ra trong quá trình biên dịch thời gian chạy.
