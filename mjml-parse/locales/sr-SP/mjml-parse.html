Чвор који компајлира МЈМЛ у прилагодљиви ХТМЛ за е-пошту.

### Инпутс

: payload (string) : МЈМЛ ознаке када ниједан шаблон није конфигурисан у уређивачу чворова.
: template (string) : опциони МЈМЛ шаблон за време извршавања (користи се само када је шаблон уређивача празан).

### Излази


1. Стандардни излаз
: payload (string) : Парсирао МЈМЛ у ХТМЛ да би се користио у имејловима.

2. Стандардна грешка
: payload (string) : стандардна грешка команде.

### Детаљи

Чвор може да прикаже чуваре места користећи Мустацхе синтаксу (на пример `{{payload}}`), слично основном чвору Темплате.

Приоритет извора шаблона:
1. Едитор шаблон (конфигурисан у чвору)
2. `msg.template`
3. `msg.payload`

Едитор потврђује исправност КСМЛ-а док куцате. Семантичка провера МЈМЛ-а се дешава током компилације током извршавања.
