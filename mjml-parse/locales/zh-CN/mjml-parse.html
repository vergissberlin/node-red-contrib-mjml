 ![MJML](https://documentation.mjml.io/images/logo.png)

将 MJML 编译为电子邮件的响应式 HTML 的节点。

### 输入

: payload (string) : 节点编辑器中未配置模板时的 MJML 标记。
: template (string) : 可选的运行时 MJML 模板（仅当编辑器模板为空时使用）。

### 输出


1. 标准输出
: payload (string) : 将 MJML 解析为 HTML 以在电子邮件中使用它。

2. 标准误
: payload (string) : 命令的标准错误。

### 细节

该节点可以使用 Mustache 语法（例如 `{{payload}}`）呈现占位符，类似于核心模板节点。

模板源优先级：
1. 编辑器模板（在节点中配置）
2. `msg.template`
3. `msg.payload`

编辑器在键入时验证 XML 的格式正确性。 MJML 语义验证发生在运行时编译期间。


### 参考

- [MJML 模板](https://mjml.io/templates)
- [MJML 文档](https://documentation.mjml.io/)
