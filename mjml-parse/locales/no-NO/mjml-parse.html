 ![MJML](https://documentation.mjml.io/images/logo.png)

En node som kompilerer MJML til responsiv HTML for e-post.

### Innganger

: payload (string) : MJML-markering når ingen mal er konfigurert i nodeeditoren.
: template (string) : valgfri MJML-mal for kjøretid (brukes bare når redigeringsmalen er tom).

### Utganger


1. Standard utgang
: payload (string) : Parset MJML til HTML for å bruke det i e-poster.

2. Standard feil
: payload (string) : standardfeilen til kommandoen.

### Detaljer

Noden kan gjengi plassholdere ved å bruke Moustache-syntaks (for eksempel `{{payload}}`), som ligner på kjernemal-noden.

Malkildeprioritet:
1. Redaktørmal (konfigurert i noden)
2. `msg.template`
3. `msg.payload`

Redaktøren validerer XML-formen mens du skriver. MJML semantisk validering skjer under kjøretidskompilering.
