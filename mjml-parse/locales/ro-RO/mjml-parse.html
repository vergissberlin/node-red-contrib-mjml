 ![MJML](https://documentation.mjml.io/images/logo.png)

Un nod care compilează MJML în HTML receptiv pentru e-mailuri.

### Intrări

: payload (string) : Markup MJML atunci când nu este configurat niciun șablon în editorul de noduri.
: template (string) : șablon MJML de rulare opțional (utilizat numai când șablonul editor este gol).

### Ieșiri


1. Ieșire standard
: payload (string) : S-a analizat MJML în HTML pentru a-l folosi în e-mailuri.

2. Eroare standard
: payload (string) : eroarea standard a comenzii.

### Detalii

Nodul poate reda substituenți folosind sintaxa Mustache (de exemplu `{{payload}}`), similar cu nodul de bază Template.

Prioritatea sursei șablonului:
1. Șablon de editor (configurat în nod)
2. `msg.template`
3. `msg.payload`

Editorul validează bine formatul XML în timpul tastării. Validarea semantică MJML are loc în timpul compilării în timpul execuției.
