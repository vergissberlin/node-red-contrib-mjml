 ![MJML](https://documentation.mjml.io/images/logo.png)

MJML を電子メール用のレスポンシブ HTML にコンパイルするノード。

### 入力

: payload (string) : ノードエディターでテンプレートが設定されていない場合の MJML マークアップ。
: template (string) : オプションのランタイム MJML テンプレート (エディター テンプレートが空の場合にのみ使用されます)。

### 出力


1. 標準出力
: payload (string) : MJML を HTML に解析して電子メールで使用します。

2. 標準誤差
: payload (string) : コマンドの標準エラー。

### 詳細

このノードは、コアの Template ノードと同様に、Mustache 構文 (`{{payload}}` など) を使用してプレースホルダーをレンダリングできます。

テンプレートソースの優先順位:
1. エディター テンプレート (ノード内で構成)
2. `msg.template`
3. `msg.payload`

エディターは入力中に XML の整形式性を検証します。 MJML セマンティック検証は実行時のコンパイル中に行われます。
