 ![MJML](https://documentation.mjml.io/images/logo.png)

एक नोड जो एमजेएमएल को ईमेल के लिए उत्तरदायी HTML में संकलित करता है।

### इनपुट

: payload (string) : एमजेएमएल मार्कअप जब नोड संपादक में कोई टेम्पलेट कॉन्फ़िगर नहीं किया गया है।
: template (string) : वैकल्पिक रनटाइम एमजेएमएल टेम्पलेट (केवल संपादक टेम्पलेट खाली होने पर उपयोग किया जाता है)।

### आउटपुट


1. मानक आउटपुट
: payload (string) : ईमेल में इसका उपयोग करने के लिए एमजेएमएल को HTML में पार्स किया गया।

2. मानक त्रुटि
: payload (string) : आदेश की मानक त्रुटि.

### विवरण

नोड कोर टेम्प्लेट नोड के समान मूंछ सिंटैक्स (उदाहरण के लिए `{{payload}}`) का उपयोग करके प्लेसहोल्डर्स को प्रस्तुत कर सकता है।

टेम्पलेट स्रोत प्राथमिकता:
1. संपादक टेम्पलेट (नोड में कॉन्फ़िगर किया गया)
2. `msg.template`
3. `msg.payload`

टाइप करते समय संपादक XML सुगठितता की पुष्टि करता है। एमजेएमएल सिमेंटिक सत्यापन रनटाइम संकलन के दौरान होता है।
