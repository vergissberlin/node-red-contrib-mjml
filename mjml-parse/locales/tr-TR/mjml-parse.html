MJML'yi e-postalar için duyarlı HTML'ye derleyen bir düğüm.

### Girişler

: payload (string) : Düğüm düzenleyicide hiçbir şablon yapılandırılmadığında MJML işaretlemesi.
: template (string) : isteğe bağlı çalışma zamanı MJML şablonu (yalnızca düzenleyici şablonu boş olduğunda kullanılır).

### Çıkışlar


1. Standart çıktı
: payload (string) : E-postalarda kullanmak için MJML'yi HTML'ye ayrıştırdık.

2. Standart hata
: payload (string) : komutun standart hatası.

### Detaylar

Düğüm, temel Şablon düğümüne benzer şekilde Mustache sözdizimini (örneğin `{{payload}}`) kullanarak yer tutucuları oluşturabilir.

Şablon kaynağı önceliği:
1. Düzenleyici şablonu (düğümde yapılandırılmıştır)
2. `msg.template`
3. `msg.payload`

Düzenleyici, yazarken XML'in iyi biçimliliğini doğrular. MJML anlam doğrulaması çalışma zamanı derlemesi sırasında gerçekleşir.
