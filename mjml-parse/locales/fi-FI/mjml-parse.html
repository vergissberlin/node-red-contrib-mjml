Solmu, joka kokoaa MJML:n responsiiviseksi HTML-koodiksi sähköposteja varten.

### Tulot

: payload (string) : MJML-merkintä, kun solmueditorissa ei ole määritetty mallia.
: template (string) : valinnainen ajonaikainen MJML-malli (käytetään vain, kun editorimalli on tyhjä).

### Lähdöt


1. Vakiolähtö
: payload (string) : MJML jäsennettiin HTML:ksi, jotta sitä voidaan käyttää sähköposteissa.

2. Normaali virhe
: payload (string) : komennon standardivirhe.

### Yksityiskohdat

Solmu voi hahmontaa paikkamerkit käyttäen Moustache-syntaksia (esimerkiksi `{{payload}}`), joka on samanlainen kuin ydinmallisolmu.

Mallin lähteen prioriteetti:
1. Editor-malli (määritetty solmussa)
2. `msg.template`
3. `msg.payload`

Editori tarkistaa XML-muodon hyvin kirjoitettaessa. MJML:n semanttinen validointi tapahtuu ajonaikaisen käännöksen aikana.
