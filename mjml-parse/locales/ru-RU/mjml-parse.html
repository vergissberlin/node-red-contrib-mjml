 ![MJML](https://documentation.mjml.io/images/logo.png)

Узел, который компилирует MJML в адаптивный HTML для электронных писем.

### Входы

: payload (string) : Разметка MJML, когда в редакторе узлов не настроен шаблон.
: template (string) : необязательный шаблон MJML времени выполнения (используется только в том случае, если шаблон редактора пуст).

### Выходы


1. Стандартный вывод
: payload (string) : Преобразование MJML в HTML для использования в электронных письмах.

2. Стандартная ошибка
: payload (string) : стандартная ошибка команды.

### Подробности

Узел может отображать заполнители с использованием синтаксиса Mustache (например, `{{payload}}`), аналогично базовому узлу Шаблон.

Приоритет источника шаблона:
1. Шаблон редактора (настраивается в узле)
2. `msg.template`
3. `msg.payload`

Редактор проверяет правильность формата XML во время набора текста. Семантическая проверка MJML происходит во время компиляции во время выполнения.
