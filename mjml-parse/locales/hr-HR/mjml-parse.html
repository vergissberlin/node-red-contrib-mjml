Čvor koji kompajlira MJML u responzivni HTML za e-poštu.

### Unosi

: payload (string) : MJML oznake kada predložak nije konfiguriran u uređivaču čvora.
: template (string) : opcionalni MJML predložak tijekom izvođenja (koristi se samo kada je predložak u uređivaču prazan).

### Izlazi


1. Standardni izlaz
: payload (string) : MJML pretvoren u HTML za korištenje u e-pošti.

2. Standardna greška
: payload (string) : standardna greška naredbe.

### Detalji

Čvor može prikazivati rezervirana mjesta koristeći Mustache sintaksu (na primjer `{{payload}}`), slično osnovnom čvoru Template.

Prioritet izvora predloška:
1. Predložak uređivača (konfiguriran u čvoru)
2. `msg.template`
3. `msg.payload`

Uređivač tijekom tipkanja provjerava je li XML ispravno oblikovan. Semantička MJML validacija događa se tijekom kompajliranja u izvođenju.
