Čvor koji kompilira MJML u odgovarajući HTML za e-poštu.

### Unosi

: payload (string) : MJML označavanje kada predložak nije konfiguriran u uređivaču čvorova.
: template (string) : opcijski runtime MJML predložak (koristi se samo kada je predložak uređivača prazan).

### Izlazi


1. Standardni izlaz
: payload (string) : Raščlanjuje MJML u HTML za korištenje u e-pošti.

2. Standardna greška
: payload (string) : standardna greška naredbe.

### pojedinosti

Čvor može prikazati rezervirana mjesta koristeći Mustache sintaksu (na primjer `{{payload}}`), slično osnovnom čvoru Template.

Prioritet izvora predloška:
1. Predložak uređivača (konfiguriran u čvoru)
2. `msg.template`
3. `msg.payload`

Uređivač provjerava ispravnost XML-a tijekom tipkanja. MJML semantička provjera valjanosti događa se tijekom runtime kompilacije.
