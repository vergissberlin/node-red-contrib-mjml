Csomópont, amely az MJML-t reszponzív HTML-kódba fordítja e-mailekhez.

### Bemenetek

: payload (string) : MJML jelölés, ha nincs sablon konfigurálva a csomópontszerkesztőben.
: template (string) : opcionális futásidejű MJML-sablon (csak akkor használható, ha a szerkesztősablon üres).

### Kimenetek


1. Szabványos kimenet
: payload (string) : Az MJML-t HTML-be elemezve használja az e-mailekben.

2. Standard hiba
: payload (string) : a parancs standard hibája.

### Részletek

A csomópont helyőrzőket tud megjeleníteni a Moustache szintaxis használatával (például `{{payload}}`), hasonlóan az alapsablon csomóponthoz.

Sablonforrás prioritása:
1. Szerkesztősablon (a csomópontban konfigurálva)
2. `msg.template`
3. `msg.payload`

A szerkesztő gépelés közben ellenőrzi az XML jól formáltságát. Az MJML szemantikai ellenőrzése a futásidejű fordítás során történik.
