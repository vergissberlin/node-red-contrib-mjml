 ![MJML](https://documentation.mjml.io/images/logo.png)

Węzeł, który kompiluje MJML do responsywnego kodu HTML dla wiadomości e-mail.

### Wejścia

: payload (string) : Znaczniki MJML, gdy w edytorze węzłów nie skonfigurowano żadnego szablonu.
: template (string) : opcjonalny szablon MJML środowiska wykonawczego (używany tylko wtedy, gdy szablon edytora jest pusty).

### Wyjścia


1. Standardowe wyjście
: payload (string) : Przeanalizowano MJML do HTML, aby używać go w wiadomościach e-mail.

2. Standardowy błąd
: payload (string) : standardowy błąd polecenia.

### Bliższe dane

Węzeł może renderować symbole zastępcze przy użyciu składni Wąsy (na przykład `{{payload}}`), podobnie jak węzeł podstawowy Szablon.

Priorytet źródła szablonu:
1. Szablon edytora (skonfigurowany w węźle)
2. `msg.template`
3. `msg.payload`

Edytor sprawdza poprawność XML podczas pisania. Sprawdzanie semantyczne MJML odbywa się podczas kompilacji w czasie wykonywania.


### Referencje
