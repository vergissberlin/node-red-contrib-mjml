 ![MJML](https://documentation.mjml.io/images/logo.png)

En nod som kompilerar MJML till responsiv HTML för e-post.

### Ingångar

: payload (string) : MJML-markering när ingen mall är konfigurerad i nodredigeraren.
: template (string) : valfri MJML-mall för körning (används endast när editormallen är tom).

### Utgångar


1. Standardutgång
: payload (string) : Parsade MJML till HTML för att använda det i e-postmeddelanden.

2. Standardfel
: payload (string) : standardfelet för kommandot.

### Detaljer

Noden kan rendera platshållare med Mustache-syntax (till exempel `{{payload}}`), liknande mallens kärna.

Mallkällprioritet:
1. Redaktörsmall (konfigurerad i noden)
2. `msg.template`
3. `msg.payload`

Redaktören validerar XML välformad när du skriver. MJML semantisk validering sker under körtidskompilering.
