 ![MJML](https://documentation.mjml.io/images/logo.png)

Вузел, які кампілюе MJML у адаптыўны HTML для электронных лістоў.

### Уваходы

: payload (string) : Разметка MJML, калі шаблон не наладжаны ў рэдактары вузлоў.
: template (string) : неабавязковы шаблон выканання MJML (выкарыстоўваецца толькі калі шаблон рэдактара пусты).

### Выхады


1. Стандартны выхад
: payload (string) : Разабраны MJML у HTML для выкарыстання ў электронных лістах.

2. Стандартная памылка
: payload (string) : стандартная памылка каманды.

### Дэталі

Вузел можа візуалізаваць запаўняльнікі з дапамогай сінтаксісу Mustache (напрыклад, `{{payload}}`), падобна асноўнаму вузлу Template.

Прыярытэт крыніцы шаблону:
1. Шаблон рэдактара (канфігуруецца ў вузле)
2. `msg.template`
3. `msg.payload`

Рэдактар ​​правярае правільнасць XML падчас уводу. Семантычная праверка MJML адбываецца падчас кампіляцыі падчас выканання.
