 ![MJML](https://documentation.mjml.io/images/logo.png)

Ένας κόμβος που μεταγλωττίζει το MJML σε αποκριτικό HTML για μηνύματα ηλεκτρονικού ταχυδρομείου.

### Εισροές

: payload (string) : Σήμανση MJML όταν δεν έχει διαμορφωθεί πρότυπο στο πρόγραμμα επεξεργασίας κόμβου.
: template (string) : προαιρετικό πρότυπο MJML χρόνου εκτέλεσης (χρησιμοποιείται μόνο όταν το πρότυπο επεξεργασίας είναι κενό).

### Έξοδοι


1. Τυπική έξοδος
: payload (string) : Ανάλυσε το MJML σε HTML για να το χρησιμοποιήσει σε μηνύματα ηλεκτρονικού ταχυδρομείου.

2. Τυπικό σφάλμα
: payload (string) : το τυπικό σφάλμα της εντολής.

### Καθέκαστα

Ο κόμβος μπορεί να αποδώσει σύμβολα κράτησης θέσης χρησιμοποιώντας τη σύνταξη Mustache (για παράδειγμα `{{payload}}`), παρόμοια με τον κόμβο του πυρήνα του προτύπου.

Προτεραιότητα πηγής προτύπου:
1. Πρότυπο επεξεργασίας (ρυθμισμένο στον κόμβο)
2. `msg.template`
3. `msg.payload`

Το πρόγραμμα επεξεργασίας επικυρώνει την καλή διαμόρφωση XML κατά την πληκτρολόγηση. Η σημασιολογική επικύρωση MJML πραγματοποιείται κατά τη διάρκεια της μεταγλώττισης χρόνου εκτέλεσης.
