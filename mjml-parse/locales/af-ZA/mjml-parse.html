'n Nodus wat MJML saamstel in responsiewe HTML vir e-posse.

### Insette

: payload (string) : MJML-opmerk wanneer geen sjabloon in die nodusredigeerder opgestel is nie.
: template (string) : opsionele runtime MJML sjabloon (slegs gebruik wanneer die redigeerder sjabloon leeg is).

### Uitsette


1. Standaard uitset
: payload (string) : MJML na HTML ontleed om dit in e-posse te gebruik.

2. Standaard fout
: payload (string) : die standaardfout van die opdrag.

### Besonderhede

Die nodus kan plekhouers weergee deur gebruik te maak van Moustache-sintaksis (byvoorbeeld `{{payload}}`), soortgelyk aan die kern Template-nodus.

Sjabloonbronprioriteit:
1. Redigeerder sjabloon (gekonfigureer in die nodus)
2. `msg.template`
3. `msg.payload`

Die redigeerder bekragtig XML goed gevorm terwyl tik. MJML semantiese validering vind plaas tydens runtime samestelling.
