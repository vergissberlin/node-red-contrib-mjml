 ![MJML](https://documentation.mjml.io/images/logo.png)

Un nœud qui compile MJML en HTML réactif pour les e-mails.

### Entrées

: payload (string) : Balisage MJML lorsqu'aucun modèle n'est configuré dans l'éditeur de nœuds.
: template (string) : Modèle MJML d'exécution facultatif (utilisé uniquement lorsque le modèle d'éditeur est vide).

### Sorties


1. Sortie standard
: payload (string) : Analyse de MJML en HTML pour l'utiliser dans les e-mails.

2. Erreur type
: payload (string) : l'erreur standard de la commande.

### Détails

Le nœud peut restituer des espaces réservés en utilisant la syntaxe Moustache (par exemple `{{payload}}`), similaire au nœud principal du modèle.

Priorité de la source du modèle :
1. Modèle d'éditeur (configuré dans le nœud)
2. `msg.template`
3. `msg.payload`

L'éditeur valide la bonne forme du XML lors de la saisie. La validation sémantique MJML a lieu lors de la compilation à l'exécution.
