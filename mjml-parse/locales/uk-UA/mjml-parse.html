 ![MJML](https://documentation.mjml.io/images/logo.png)

Вузол, який компілює MJML у адаптивний HTML для електронних листів.

### Вхідні дані

: payload (string) : Розмітка MJML, якщо шаблон не налаштовано в редакторі вузлів.
: template (string) : додатковий шаблон MJML середовища виконання (використовується лише тоді, коли шаблон редактора порожній).

### Виходи


1. Стандартний вихід
: payload (string) : Розбирає MJML до HTML для використання в електронних листах.

2. Стандартна помилка
: payload (string) : стандартна помилка команди.

### Подробиці

Вузол може відтворювати заповнювачі за допомогою синтаксису Mustache (наприклад, `{{payload}}`), подібно до основного вузла Template.

Пріоритет джерела шаблону:
1. Шаблон редактора (налаштовується у вузлі)
2. `msg.template`
3. `msg.payload`

Редактор перевіряє коректність XML під час введення. Семантична перевірка MJML відбувається під час компіляції під час виконання.
