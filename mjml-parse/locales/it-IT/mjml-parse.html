 ![MJML](https://documentation.mjml.io/images/logo.png)

Un nodo che compila MJML in HTML reattivo per le e-mail.

### Ingressi

: payload (string) : Markup MJML quando nessun modello è configurato nell'editor del nodo.
: template (string) : modello MJML runtime opzionale (utilizzato solo quando il modello dell'editor è vuoto).

### Uscite


1. Uscita standard
: payload (string) : Analizzato MJML in HTML per utilizzarlo nelle e-mail.

2. Errore standard
: payload (string) : l'errore standard del comando.

### Dettagli

Il nodo può eseguire il rendering dei segnaposto utilizzando la sintassi Moustache (ad esempio `{{payload}}`), simile al nodo Template principale.

Priorità origine modello:
1. Modello editor (configurato nel nodo)
2. `msg.template`
3. `msg.payload`

L'editor convalida la corretta formazione dell'XML durante la digitazione. La convalida semantica MJML avviene durante la compilazione del runtime.
