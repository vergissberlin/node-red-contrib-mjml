ایک نوڈ جو ایم جے ایم ایل کو ای میلز کے لیے جوابی HTML میں مرتب کرتا ہے۔

### ان پٹ

: payload (string) : MJML مارک اپ جب نوڈ ایڈیٹر میں کوئی ٹیمپلیٹ کنفیگر نہ ہو۔
: template (string) : اختیاری رن ٹائم MJML ٹیمپلیٹ (صرف اس وقت استعمال ہوتا ہے جب ایڈیٹر ٹیمپلیٹ خالی ہو)۔

### آؤٹ پٹس


1. معیاری آؤٹ پٹ
: payload (string) : ایم جے ایم ایل کو ای میلز میں استعمال کرنے کے لیے اسے HTML میں پارس کیا۔

2. معیاری غلطی
: payload (string) : کمانڈ کی معیاری غلطی۔

### تفصیلات

نوڈ بنیادی ٹیمپلیٹ نوڈ کی طرح Mustache نحو (مثال کے طور پر `{{payload}}`) کا استعمال کرتے ہوئے پلیس ہولڈرز کو رینڈر کر سکتا ہے۔

ٹیمپلیٹ سورس کی ترجیح:
1. ایڈیٹر ٹیمپلیٹ (نوڈ میں تشکیل شدہ)
2. `msg.template`
3. `msg.payload`

ایڈیٹر ٹائپ کرتے وقت XML کی اچھی تشکیل کی توثیق کرتا ہے۔ MJML سیمنٹک توثیق رن ٹائم کمپلیشن کے دوران ہوتی ہے۔
