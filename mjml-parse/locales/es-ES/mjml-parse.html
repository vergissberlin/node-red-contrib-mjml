 ![MJML](https://documentation.mjml.io/images/logo.png)

Un nodo que compila MJML en HTML responsivo para correos electrónicos.

### Entradas

: payload (string) : Marcado MJML cuando no se configura ninguna plantilla en el editor de nodos.
: template (string) : Plantilla MJML de tiempo de ejecución opcional (se usa solo cuando la plantilla del editor está vacía).

### Salidas


1. Salida estándar
: payload (string) : Se analizó MJML a HTML para usarlo en correos electrónicos.

2. error estándar
: payload (string) : el error estándar del comando.

### Detalles

El nodo puede representar marcadores de posición utilizando la sintaxis Moustache (por ejemplo `{{payload}}`), similar al nodo Plantilla principal.

Prioridad de fuente de plantilla:
1. Plantilla de editor (configurada en el nodo)
2. `msg.template`
3. `msg.payload`

El editor valida el buen formato de XML mientras escribe. La validación semántica de MJML ocurre durante la compilación en tiempo de ejecución.

- [Documentación MJML](https://documentation.mjml.io/)
