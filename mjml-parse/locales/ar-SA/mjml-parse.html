عقدة تقوم بتجميع MJML إلى HTML سريع الاستجابة لرسائل البريد الإلكتروني.

### المدخلات

: payload (string) : ترميز MJML عند عدم تكوين أي قالب في محرر العقدة.
: template (string) : قالب MJML الاختياري لوقت التشغيل (يُستخدم فقط عندما يكون قالب المحرر فارغًا).

### النواتج


1. الإخراج القياسي
: payload (string) : تحليل MJML إلى HTML لاستخدامه في رسائل البريد الإلكتروني.

2. خطأ قياسي
: payload (string) : الخطأ القياسي للأمر.

### تفاصيل

يمكن للعقدة عرض العناصر النائبة باستخدام بناء جملة Moustache (على سبيل المثال `{{payload}}`)، على غرار عقدة القالب الأساسية.

أولوية مصدر القالب:
1. قالب المحرر (تم تكوينه في العقدة)
2. `msg.template`
3. `msg.payload`

يتحقق المحرر من صحة صياغة XML أثناء الكتابة. يحدث التحقق الدلالي MJML أثناء تجميع وقت التشغيل.
