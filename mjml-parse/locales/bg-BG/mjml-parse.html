Възел, който компилира MJML в адаптивен HTML за имейли.

### Входове

: payload (string) : MJML маркиране, когато в редактора на възли не е конфигуриран шаблон.
: template (string) : незадължителен шаблон за изпълнение на MJML (използва се само когато шаблонът на редактора е празен).

### Изходи


1. Стандартен изход
: payload (string) : Анализира MJML в HTML, за да го използва в имейли.

2. Стандартна грешка
: payload (string) : стандартната грешка на командата.

### Подробности

Възелът може да визуализира контейнери, използвайки синтаксис на Mustache (например `{{payload}}`), подобно на основния възел на шаблона.

Приоритет на източника на шаблона:
1. Шаблон на редактор (конфигуриран във възела)
2. `msg.template`
3. `msg.payload`

Редакторът проверява правилното формиране на XML, докато пишете. MJML семантично валидиране се случва по време на компилация по време на изпълнение.
