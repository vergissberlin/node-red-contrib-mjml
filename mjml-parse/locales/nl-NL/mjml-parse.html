Een knooppunt dat MJML compileert naar responsieve HTML voor e-mails.

### Ingangen

: payload (string) : MJML-opmaak wanneer er geen sjabloon is geconfigureerd in de knooppunteditor.
: template (string) : optionele runtime MJML-sjabloon (alleen gebruikt als de editorsjabloon leeg is).

### Uitgangen


1. Standaard uitvoer
: payload (string) : Parseerde MJML naar HTML om het in e-mails te gebruiken.

2. Standaard fout
: payload (string) : de standaardfout van het commando.

### Details

Het knooppunt kan tijdelijke aanduidingen weergeven met de Moustache-syntaxis (bijvoorbeeld `{{payload}}`), vergelijkbaar met het kernsjabloonknooppunt.

Prioriteit sjabloonbron:
1. Editor-sjabloon (geconfigureerd in het knooppunt)
2. `msg.template`
3. `msg.payload`

De editor valideert de XML-goedgevormdheid tijdens het typen. Semantische MJML-validatie vindt plaats tijdens runtime-compilatie.


### Referenties

- [MJML-sjablonen](https://mjml.io/templates)
- [MJML-documentatie](https://documentation.mjml.io/)
