 ![MJML](https://documentation.mjml.io/images/logo.png)

En node, der kompilerer MJML til responsiv HTML til e-mails.

### Indgange

: payload (string) : MJML-markering, når ingen skabelon er konfigureret i nodeeditoren.
: template (string) : valgfri runtime MJML-skabelon (bruges kun, når editorskabelonen er tom).

### Udgange


1. Standard output
: payload (string) : Parset MJML til HTML for at bruge det i e-mails.

2. Standard fejl
: payload (string) : kommandoens standardfejl.

### Detaljer

Noden kan gengive pladsholdere ved hjælp af Moustache-syntaks (for eksempel `{{payload}}`), svarende til kerneskabelonknuden.

Skabelonkildeprioritet:
1. Editor-skabelon (konfigureret i noden)
2. `msg.template`
3. `msg.payload`

Editoren validerer XML-formen, mens du skriver. MJML semantisk validering sker under runtime kompilering.
