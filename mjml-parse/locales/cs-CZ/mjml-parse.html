Uzel, který kompiluje MJML do responzivního HTML pro e-maily.

### Vstupy

: payload (string) : Označení MJML, když v editoru uzlů není nakonfigurována žádná šablona.
: template (string) : volitelná runtime šablona MJML (používá se pouze v případě, že je šablona editoru prázdná).

### Výstupy


1. Standardní výstup
: payload (string) : Analyzoval MJML do HTML, aby bylo možné jej použít v e-mailech.

2. Standardní chyba
: payload (string) : standardní chyba příkazu.

### Podrobnosti

Uzel může vykreslovat zástupné symboly pomocí syntaxe Mustache (například `{{payload}}`), podobně jako hlavní uzel Template.

Priorita zdroje šablony:
1. Šablona editoru (nakonfigurována v uzlu)
2. `msg.template`
3. `msg.payload`

Editor ověřuje správnou formu XML při psaní. Sémantické ověření MJML probíhá během kompilace za běhu.
