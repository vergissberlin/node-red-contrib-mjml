# Release Please: creates/updates release PRs from conventional commits.
# Optional: set REPO_TOKEN in repository secrets for push access (e.g. PAT).
# If unset, the default GITHUB_TOKEN is used.
name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.REPO_TOKEN || github.token }}
          release-type: node
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
